<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Monthly Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ── */
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --surface3: #252525;
  --accent: #e8ff47;
  --accent2: #ff6b6b;
  --accent3: #6bffd4;
  --accent4: #ffaa6b;
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #3a3a3a;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --sb-w: 252px;
  --toggle-w: 40px;
  --header-h: 58px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Epilogue',sans-serif;
  display:flex;
  flex-direction:column;
}

/* ── TOPBAR ── */
.topbar{
  height:var(--header-h);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:12px;
  flex-shrink:0;
  z-index:100;
  position:relative;
}
.sb-toggle{
  width:36px;height:36px;
  border-radius:10px;
  background:none;
  border:1px solid var(--border2);
  color:var(--muted);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .2s;
  font-size:1rem;
}
.sb-toggle:hover{color:var(--accent);border-color:var(--accent);}
.topbar-logo{
  font-family:'Syne',sans-serif;
  font-size:1.1rem;
  font-weight:800;
  color:var(--accent);
  letter-spacing:-0.5px;
  flex-shrink:0;
}
.topbar-title{
  font-family:'Syne',sans-serif;
  font-size:0.85rem;
  font-weight:700;
  color:var(--text);
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.topbar-title span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tab-btn{
  padding:6px 13px;
  border-radius:20px;
  border:1px solid var(--border2);
  background:none;
  color:var(--muted);
  font-family:'Epilogue',sans-serif;
  font-size:0.72rem;
  font-weight:500;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.tab-btn.rem-btn.has{border-color:var(--accent2);color:var(--accent2);}
.tab-btn.rem-btn.has.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}

/* Google auth button */
.auth-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;
  border-radius:20px;
  border:1px solid var(--border2);
  background:none;
  color:var(--muted);
  font-family:'Epilogue',sans-serif;
  font-size:0.72rem;
  font-weight:500;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.auth-btn:hover{border-color:var(--border2);color:var(--text);}
.auth-btn img{width:14px;height:14px;}
.user-avatar{
  width:28px;height:28px;
  border-radius:50%;
  border:1.5px solid var(--accent);
  object-fit:cover;
  cursor:pointer;
  flex-shrink:0;
}
.user-menu{
  position:absolute;
  top:calc(var(--header-h) + 6px);
  right:16px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:12px;
  padding:10px;
  min-width:200px;
  z-index:999;
  display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.user-menu.open{display:block;}
.user-menu-name{font-weight:600;font-size:0.82rem;color:var(--text);margin-bottom:2px;}
.user-menu-email{font-size:0.7rem;color:var(--muted);margin-bottom:10px;}
.sign-out-btn{
  width:100%;
  padding:7px;
  background:rgba(255,107,107,.1);
  border:1px solid rgba(255,107,107,.25);
  border-radius:8px;
  color:var(--accent2);
  font-family:'Epilogue',sans-serif;
  font-size:0.74rem;
  cursor:pointer;
  transition:all .15s;
}
.sign-out-btn:hover{background:rgba(255,107,107,.2);}

/* ── BODY LAYOUT ── */
.app-body{
  flex:1;
  display:flex;
  overflow:hidden;
  position:relative;
}

/* ── OVERLAY for mobile ── */
.sb-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  z-index:199;
}
.sb-overlay.show{display:block;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sb-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  height:100%;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  scrollbar-width:thin;
  scrollbar-color:var(--muted2) transparent;
  transition:transform .28s cubic-bezier(.4,0,.2,1), width .28s cubic-bezier(.4,0,.2,1);
  z-index:200;
  position:relative;
}
/* Collapsed state */
.sidebar.collapsed{
  width:0;
  transform:translateX(-100%);
  overflow:hidden;
  border-right:none;
}

/* On mobile sidebar is absolute overlay */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    top:var(--header-h);
    left:0;
    height:calc(100% - var(--header-h));
    transform:translateX(-100%);
    z-index:200;
  }
  .sidebar.open{
    transform:translateX(0);
  }
  .sidebar.collapsed{
    width:var(--sb-w);
    transform:translateX(-100%);
  }
}

.sb-inner{width:var(--sb-w);min-width:var(--sb-w);}

.year-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
}
.year-txt{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;}
.yb{
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:1rem;
  padding:3px 8px;border-radius:6px;transition:all .15s;
}
.yb:hover{color:var(--accent);background:rgba(232,255,71,.08);}
.month-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:5px;padding:12px 13px;
  border-bottom:1px solid var(--border);
}
.mb{
  position:relative;padding:8px 4px;
  background:none;border:1px solid var(--border2);
  border-radius:8px;color:var(--muted);
  font-family:'Epilogue',sans-serif;font-size:0.72rem;
  font-weight:500;cursor:pointer;transition:all .15s;
  text-align:center;
}
.mb:hover{border-color:var(--accent);color:var(--accent);}
.mb.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.mb .dot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--accent2);}
.week-list{padding:12px 13px;flex:1;}
.wl-title{font-size:0.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:8px;}
.wi{
  padding:9px 10px;border:1px solid var(--border);
  border-radius:10px;margin-bottom:5px;cursor:pointer;transition:all .15s;
}
.wi:hover{border-color:var(--border2);background:var(--surface2);}
.wi.active{border-color:var(--accent);background:rgba(232,255,71,.05);}
.wi-label{font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700;color:var(--text);margin-bottom:1px;}
.wi.active .wi-label{color:var(--accent);}
.wi-dates{font-size:0.65rem;color:var(--muted);}
.wi-pbar{height:3px;background:var(--border);border-radius:10px;margin-top:5px;overflow:hidden;}
.wi-pfill{height:100%;background:var(--accent3);border-radius:10px;transition:width .3s;}

/* ── MAIN ── */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-width:0;
}
.mb-body{
  flex:1;
  overflow-y:auto;
  padding:20px 22px;
  scrollbar-width:thin;
  scrollbar-color:var(--muted2) transparent;
}

/* ── VIEWS ── */
.wview,.rview{display:none;}
.wview.on,.rview.on{display:block;}
.wv-top{font-family:'Syne',sans-serif;font-size:0.62rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}
.stats-row{
  display:flex;gap:10px;margin-bottom:16px;
  padding:12px 14px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
}
.st{flex:1;text-align:center;}
.st-n{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;line-height:1;margin-bottom:2px;}
.st-l{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* DAYS GRID */
.days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s;}
.dc:hover{border-color:var(--border2);}
.dc.today-card{border-color:rgba(232,255,71,.35);}
.dc-head{
  padding:10px 13px;background:var(--surface2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.dc-dow{font-family:'Syne',sans-serif;font-size:0.66rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.dc-num{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
.today-card .dc-num{color:var(--accent);}
.today-pill{font-size:0.56rem;background:var(--accent);color:#000;padding:2px 6px;border-radius:10px;font-weight:700;text-transform:uppercase;}
.dc-tasks{padding:8px 11px;min-height:50px;}
.no-t{padding:10px 0;text-align:center;font-size:0.7rem;color:var(--muted2);font-style:italic;}
.ti{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);animation:fi .2s ease;}
.ti:last-child{border-bottom:none;}
@keyframes fi{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:translateY(0);}}
.tc{
  width:17px;height:17px;border-radius:5px;border:1.5px solid var(--muted2);
  background:none;cursor:pointer;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-size:0.56rem;color:transparent;
}
.tc:hover{border-color:var(--accent3);}
.tc.ck{background:var(--accent3);border-color:var(--accent3);color:#000;}
.tw{flex:1;}
.tt{font-size:0.77rem;color:var(--text);line-height:1.4;word-break:break-word;}
.tt.done{text-decoration:line-through;color:var(--muted);}
.tpill{display:inline-block;padding:1px 6px;border-radius:20px;font-size:0.58rem;font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.tdel{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:0.7rem;padding:2px 4px;border-radius:4px;opacity:0;transition:all .15s;flex-shrink:0;}
.ti:hover .tdel{opacity:1;}
.tdel:hover{color:var(--accent2);}
.add-row{display:flex;gap:5px;padding:7px 11px 9px;border-top:1px solid var(--border);}
.ai{
  flex:1;background:var(--surface3);border:1px solid var(--border);
  border-radius:8px;padding:5px 9px;color:var(--text);
  font-family:'Epilogue',sans-serif;font-size:0.75rem;outline:none;transition:border-color .15s;
}
.ai:focus{border-color:var(--accent);}
.ai::placeholder{color:var(--muted2);}
.ts{
  background:var(--surface3);border:1px solid var(--border);
  border-radius:8px;padding:5px 4px;color:var(--muted);
  font-family:'Epilogue',sans-serif;font-size:0.68rem;outline:none;cursor:pointer;width:74px;
}
.ab{
  background:var(--accent);border:none;border-radius:8px;
  width:26px;height:26px;color:#000;font-size:.9rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-weight:700;transition:transform .1s;flex-shrink:0;
}
.ab:hover{transform:scale(1.1);}

/* REMAINING */
.rem-empty{text-align:center;padding:60px 20px;}
.rem-empty-ic{font-size:2.8rem;margin-bottom:10px;}
.rem-empty-tx{font-family:'Syne',sans-serif;font-size:.95rem;color:var(--muted);}
.overdue-banner{
  background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);
  border-radius:10px;padding:11px 14px;margin-bottom:18px;
  display:flex;align-items:center;gap:10px;font-size:.79rem;color:#ffaaaa;
}
.overdue-banner strong{color:var(--accent2);font-size:1.15rem;font-family:'Syne',sans-serif;}
.rg{margin-bottom:20px;}
.rg-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.rg-badge{background:var(--accent2);color:#fff;font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;}
.rg-ago{font-size:.66rem;color:var(--muted);}
.ri{
  display:flex;align-items:flex-start;gap:9px;
  padding:9px 11px;background:var(--surface);
  border:1px solid rgba(255,107,107,.13);border-left:3px solid var(--accent2);
  border-radius:10px;margin-bottom:5px;animation:fi .2s ease;
}
.rc{
  width:17px;height:17px;border-radius:5px;
  border:1.5px solid rgba(255,107,107,.4);background:none;cursor:pointer;
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-size:.56rem;color:transparent;
}
.rc:hover{border-color:var(--accent3);}
.rc.ck{background:var(--accent3);border-color:var(--accent3);color:#000;}
.rt{font-size:.78rem;color:var(--text);line-height:1.4;}
.rt.done{text-decoration:line-through;color:var(--muted);}

/* placeholder */
.placeholder-screen{text-align:center;padding:60px 20px;}
.placeholder-screen .ic{font-size:3rem;margin-bottom:12px;}
.placeholder-screen .tx{font-family:'Syne',sans-serif;font-size:.95rem;color:var(--muted);}

/* Sync status */
.sync-badge{
  font-size:0.62rem;padding:3px 8px;border-radius:10px;
  background:rgba(107,255,212,.1);color:var(--accent3);
  border:1px solid rgba(107,255,212,.2);
  white-space:nowrap;
}
.sync-badge.local{background:rgba(255,170,107,.1);color:var(--accent4);border-color:rgba(255,170,107,.2);}

/* Auth modal */
.auth-modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:9999;align-items:center;justify-content:center;
}
.auth-modal-bg.show{display:flex;}
.auth-modal{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:18px;padding:32px 28px;max-width:360px;width:90%;
  text-align:center;
}
.auth-modal h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:6px;}
.auth-modal p{font-size:0.8rem;color:var(--muted);margin-bottom:24px;line-height:1.5;}
.google-signin-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:12px;
  background:#fff;border:none;border-radius:10px;
  color:#333;font-family:'Epilogue',sans-serif;font-size:0.85rem;font-weight:600;
  cursor:pointer;transition:all .15s;margin-bottom:10px;
}
.google-signin-btn:hover{background:#f0f0f0;}
.google-signin-btn img{width:18px;height:18px;}
.auth-skip{
  background:none;border:none;color:var(--muted);font-family:'Epilogue',sans-serif;
  font-size:0.75rem;cursor:pointer;text-decoration:underline;
}
.auth-skip:hover{color:var(--text);}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:10px;}

/* ── RESPONSIVE ── */
/* Tablet */
@media(max-width:1024px){
  .days-grid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));}
  .mb-body{padding:16px 16px;}
}
/* Mobile large */
@media(max-width:768px){
  :root{--header-h:52px;}
  .topbar-title{font-size:0.78rem;}
  .tab-btn{padding:5px 10px;font-size:0.68rem;}
  .auth-btn{padding:5px 9px;font-size:0.68rem;}
  .days-grid{grid-template-columns:1fr;}
  .mb-body{padding:12px 12px;}
  .stats-row{gap:6px;padding:10px 10px;}
  .st-n{font-size:1.1rem;}
  .st-l{font-size:0.55rem;}
}
/* Mobile small */
@media(max-width:480px){
  .topbar{padding:0 10px;gap:8px;}
  .topbar-logo{font-size:0.95rem;}
  .tab-btn span.tab-text{display:none;}
  .tab-btn.active span.tab-icon{display:inline;}
  .auth-btn .auth-label{display:none;}
  .mb-body{padding:10px 10px;}
  .stats-row{flex-wrap:wrap;}
  .st{min-width:45%;}
}
/* Very small */
@media(max-width:360px){
  .topbar-title{display:none;}
  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="sb-toggle" id="sbToggle" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
  <div class="topbar-logo">TaskFlow</div>
  <div class="topbar-title" id="mainTitle">Pick a <span>Month</span></div>
  <div class="topbar-right">
    <span class="sync-badge local" id="syncBadge">💾 Local</span>
    <button class="tab-btn active" id="tabW" onclick="switchTab('week')">
      <span class="tab-icon">📅</span><span class="tab-text"> Week View</span>
    </button>
    <button class="tab-btn rem-btn" id="tabR" onclick="switchTab('remaining')">
      <span class="tab-icon">⚠</span><span class="tab-text"> Remaining</span>
    </button>
    <!-- Auth area -->
    <div id="authArea">
      <button class="auth-btn" onclick="showAuthModal()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
        <span class="auth-label">Sign in</span>
      </button>
    </div>
  </div>
</div>

<!-- USER MENU -->
<div class="user-menu" id="userMenu">
  <div class="user-menu-name" id="umName"></div>
  <div class="user-menu-email" id="umEmail"></div>
  <button class="sign-out-btn" onclick="signOut()">Sign out</button>
</div>

<!-- BODY -->
<div class="app-body">
  <div class="sb-overlay" id="sbOverlay" onclick="closeSidebarMobile()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-inner">
      <div class="year-bar">
        <button class="yb" onclick="chYear(-1)">‹</button>
        <div class="year-txt" id="yearLbl">2026</div>
        <button class="yb" onclick="chYear(1)">›</button>
      </div>
      <div class="month-grid" id="monthGrid"></div>
      <div class="week-list" id="weekList"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="mb-body">
      <div class="wview on" id="wview">
        <div class="placeholder-screen"><div class="ic">📅</div><div class="tx">Select a month &amp; week from the sidebar</div></div>
      </div>
      <div class="rview" id="rview"></div>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="auth-modal-bg" id="authModalBg">
  <div class="auth-modal">
    <h2>Sync Across Devices</h2>
    <p>Sign in with Google to save your tasks in the cloud and access them from any device with the same account.</p>
    <button class="google-signin-btn" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Continue with Google
    </button>
    <button class="auth-skip" onclick="hideAuthModal()">Continue without signing in</button>
  </div>
</div>

<!-- Firebase SDK -->

  messagingSenderId: "117915873119",
  appId: "1:117915873119:web:4a3f6d44b87aba307110ea"
};

let app, auth, db, currentUser = null, unsubSnap = null;

try {
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    currentUser = user;
    if (user) {
      // Signed in
      document.getElementById('authArea').innerHTML = `
        <img class="user-avatar" id="userAvatar" src="${user.photoURL||'https://ui-avatars.com/api/?name='+encodeURIComponent(user.displayName||'U')+'&background=e8ff47&color=000'}"
          alt="avatar" onclick="toggleUserMenu()">
      `;
      document.getElementById('umName').textContent = user.displayName || 'User';
      document.getElementById('umEmail').textContent = user.email || '';
      document.getElementById('syncBadge').textContent = '☁ Synced';
      document.getElementById('syncBadge').classList.remove('local');

      // Subscribe to Firestore realtime updates
      if (unsubSnap) unsubSnap();
      const ref = doc(db, 'users', user.uid, 'data', 'tasks');
      unsubSnap = onSnapshot(ref, snap => {
        if (snap.exists()) {
          S.tasks = snap.data().tasks || {};
          save(); refresh();
        }
      });
    } else {
      currentUser = null;
      if (unsubSnap) { unsubSnap(); unsubSnap = null; }
      document.getElementById('authArea').innerHTML = `
        <button class="auth-btn" onclick="showAuthModal()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" style="width:14px;height:14px;">
          <span class="auth-label">Sign in</span>
        </button>`;
      document.getElementById('syncBadge').textContent = '💾 Local';
      document.getElementById('syncBadge').classList.add('local');
    }
  });

  // Expose to window for onclick handlers
  window._fbSignIn = async () => {
    const provider = new GoogleAuthProvider();
    try { await signInWithPopup(auth, provider); hideAuthModal(); }
    catch(e) { console.error(e); }
  };

  window._fbSignOut = async () => {
    try { await fbSignOut(auth); }
    catch(e) { console.error(e); }
    document.getElementById('userMenu').classList.remove('open');
  };

  window._saveToCloud = async (tasks) => {
    if (!currentUser || !db) return;
    try {
      const ref = doc(db, 'users', currentUser.uid, 'data', 'tasks');
      await setDoc(ref, { tasks, updatedAt: new Date().toISOString() });
    } catch(e) { console.warn('Cloud save failed:', e); }
  };

} catch(e) {
  console.warn('Firebase not configured. Running in local-only mode.', e);
  window._fbSignIn = () => {
    alert('Firebase is not configured yet.\n\nTo enable Google sign-in:\n1. Create a project at console.firebase.google.com\n2. Enable Authentication → Google\n3. Enable Firestore Database\n4. Replace the firebaseConfig values in this file.');
    hideAuthModal();
  };
  window._fbSignOut = () => {};
  window._saveToCloud = () => {};
}
</script>

<script>
// ── CONSTANTS ──
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const TAGS={
  work:    {bg:'rgba(107,255,212,.15)',c:'#6bffd4'},
  study:   {bg:'rgba(232,255,71,.15)', c:'#e8ff47'},
  health:  {bg:'rgba(107,179,255,.15)',c:'#6bb3ff'},
  personal:{bg:'rgba(255,170,107,.15)',c:'#ffaa6b'},
  other:   {bg:'rgba(200,200,200,.1)', c:'#aaa'},
};

// ── STATE ──
let S = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  week: 0,
  tab: 'week',
  tasks: JSON.parse(localStorage.getItem('tf_tasks')||'{}'),
};

// Sidebar open/closed state
let sidebarOpen = window.innerWidth > 768;

// ── HELPERS ──
function save() {
  localStorage.setItem('tf_tasks', JSON.stringify(S.tasks));
  if (window._saveToCloud) window._saveToCloud(S.tasks);
}
function dKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── WEEK CALCULATION ──
// Fixed: Week 1 = days 1-7, Week 2 = 8-14, Week 3 = 15-21, Week 4 = 22-28, Week 5 = 29-end
function getWeeks(y, m) {
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const weeks = [];
  let day = 1, wn = 1;
  while (day <= daysInMonth) {
    const end = Math.min(day + 6, daysInMonth);
    const days = [];
    for (let d = day; d <= end; d++) days.push(d);
    weeks.push({ wn, start: day, end, days });
    day = end + 1;
    wn++;
  }
  return weeks;
}

function getTasksFor(dk){
  return Object.entries(S.tasks)
    .filter(([k])=>k.startsWith(dk+'::'))
    .map(([k,v])=>({key:k,...v}));
}

// ── SIDEBAR TOGGLE ──
function toggleSidebar(){
  const isMobile = window.innerWidth <= 768;
  if(isMobile){
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
    document.getElementById('sbOverlay').classList.toggle('show', sidebarOpen);
  } else {
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  }
}

function closeSidebarMobile(){
  sidebarOpen = false;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('show');
}

// Handle resize
window.addEventListener('resize', ()=>{
  const isMobile = window.innerWidth <= 768;
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sbOverlay');
  if(!isMobile){
    sb.classList.remove('open');
    ov.classList.remove('show');
    if(sidebarOpen) sb.classList.remove('collapsed');
  } else {
    sb.classList.remove('collapsed');
    if(!sidebarOpen){ sb.classList.remove('open'); ov.classList.remove('show'); }
  }
});

// ── AUTH ──
function showAuthModal(){ document.getElementById('authModalBg').classList.add('show'); }
function hideAuthModal(){ document.getElementById('authModalBg').classList.remove('show'); }
function signInWithGoogle(){ if(window._fbSignIn) window._fbSignIn(); }
function signOut(){ if(window._fbSignOut) window._fbSignOut(); }
function toggleUserMenu(){
  document.getElementById('userMenu').classList.toggle('open');
}
document.addEventListener('click', e=>{
  const um = document.getElementById('userMenu');
  if(um.classList.contains('open') && !um.contains(e.target) && !e.target.closest('#userAvatar')) {
    um.classList.remove('open');
  }
});

// ── RENDER SIDEBAR ──
function renderSidebar(){
  document.getElementById('yearLbl').textContent = S.year;

  const mg = document.getElementById('monthGrid');
  mg.innerHTML='';
  MONTHS.forEach((nm,i)=>{
    const b = document.createElement('button');
    b.className='mb'+(i===S.month?' active':'');
    const pfx=`${S.year}-${String(i+1).padStart(2,'0')}-`;
    if(Object.keys(S.tasks).some(k=>k.startsWith(pfx))){
      const dot=document.createElement('div'); dot.className='dot'; b.appendChild(dot);
    }
    b.appendChild(document.createTextNode(nm.slice(0,3)));
    b.onclick=()=>{ S.month=i; S.week=0; refresh(); };
    mg.appendChild(b);
  });

  const wl = document.getElementById('weekList');
  wl.innerHTML='';
  const weeks = getWeeks(S.year, S.month);
  if(!weeks.length) return;
  const title = document.createElement('div'); title.className='wl-title';
  title.textContent=MONTHS[S.month]+' Weeks';
  wl.appendChild(title);
  weeks.forEach((w,wi)=>{
    let tot=0,dn=0;
    w.days.forEach(d=>{ const ts=getTasksFor(dKey(S.year,S.month,d)); tot+=ts.length; dn+=ts.filter(t=>t.done).length; });
    const pct=tot>0?Math.round(dn/tot*100):0;
    const el=document.createElement('div');
    el.className='wi'+(wi===S.week?' active':'');
    el.innerHTML=`<div class="wi-label">Week ${w.wn} <span style="font-weight:400;color:var(--muted);font-size:0.65rem">(${w.start}–${w.end})</span></div><div class="wi-dates">${MONTHS[S.month].slice(0,3)} ${w.start} – ${MONTHS[S.month].slice(0,3)} ${w.end}</div><div class="wi-pbar"><div class="wi-pfill" style="width:${pct}%"></div></div>`;
    el.onclick=()=>{ S.week=wi; switchTab('week'); refresh(); if(window.innerWidth<=768) closeSidebarMobile(); };
    wl.appendChild(el);
  });
}

// ── RENDER WEEK VIEW ──
function renderWeek(){
  const wv = document.getElementById('wview');
  const weeks = getWeeks(S.year, S.month);
  const w = weeks[S.week];
  if(!w){ wv.innerHTML=`<div class="placeholder-screen"><div class="ic">📅</div><div class="tx">Select a month &amp; week from the sidebar</div></div>`; return; }

  const todayStr = dKey(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  let tot=0,dn=0;
  w.days.forEach(d=>{ const ts=getTasksFor(dKey(S.year,S.month,d)); tot+=ts.length; dn+=ts.filter(t=>t.done).length; });

  let html=`<div class="wv-top">${MONTHS[S.month]} ${w.start}–${w.end}, ${S.year}</div>
  <div class="stats-row">
    <div class="st"><div class="st-n" style="color:var(--accent)">${tot}</div><div class="st-l">Total</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent3)">${dn}</div><div class="st-l">Done</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent2)">${tot-dn}</div><div class="st-l">Left</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent4)">${tot>0?Math.round(dn/tot*100):0}%</div><div class="st-l">Rate</div></div>
  </div>
  <div class="days-grid">`;

  w.days.forEach(d=>{
    const dk=dKey(S.year,S.month,d);
    const dow=new Date(S.year,S.month,d).getDay();
    const isToday=dk===todayStr;
    const tasks=getTasksFor(dk);
    html+=`<div class="dc${isToday?' today-card':''}">
      <div class="dc-head">
        <div><div class="dc-dow">${DAYS_SHORT[dow]}</div><div class="dc-num">${d}</div></div>
        ${isToday?'<span class="today-pill">Today</span>':''}
      </div>
      <div class="dc-tasks">`;
    if(!tasks.length){ html+=`<div class="no-t">No tasks yet</div>`; }
    else tasks.forEach(t=>{
      const tc=TAGS[t.tag]||TAGS.other;
      const sk=t.key.replace(/:/g,'_');
      html+=`<div class="ti" id="ti-${sk}">
        <button class="tc${t.done?' ck':''}" onclick="toggle('${t.key}')">${t.done?'✓':''}</button>
        <div class="tw">
          <div class="tt${t.done?' done':''}">${esc(t.text)}</div>
          <span class="tpill" style="background:${tc.bg};color:${tc.c}">${t.tag}</span>
        </div>
        <button class="tdel" onclick="del('${t.key}')">✕</button>
      </div>`;
    });
    html+=`</div>
      <div class="add-row">
        <input class="ai" id="ai-${dk}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addT('${dk}')">
        <select class="ts" id="ts-${dk}">
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="health">Health</option>
          <option value="personal">Personal</option>
          <option value="other">Other</option>
        </select>
        <button class="ab" onclick="addT('${dk}')">+</button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  wv.innerHTML=html;
}

// ── RENDER REMAINING ──
function renderRemaining(){
  const rv=document.getElementById('rview');
  const today=new Date(); today.setHours(0,0,0,0);
  const map={};

  Object.entries(S.tasks).forEach(([key,task])=>{
    if(task.done) return;
    const ds=key.split('::')[0];
    const [y,m,d]=ds.split('-').map(Number);
    const td=new Date(y,m-1,d); td.setHours(0,0,0,0);
    if(td<today){ if(!map[ds]) map[ds]=[]; map[ds].push({key,...task}); }
  });

  const dates=Object.keys(map).sort();
  const total=dates.reduce((a,d)=>a+map[d].length,0);

  const tabR=document.getElementById('tabR');
  if(total>0){ tabR.classList.add('has'); tabR.querySelector('.tab-text').textContent=` Remaining (${total})`; }
  else{ tabR.classList.remove('has'); tabR.querySelector('.tab-text').textContent=' Remaining'; }

  if(!dates.length){ rv.innerHTML=`<div class="rem-empty"><div class="rem-empty-ic">✅</div><div class="rem-empty-tx">All caught up! No overdue tasks.</div></div>`; return; }

  let html=`<div class="overdue-banner"><strong>${total}</strong><span>overdue task${total!==1?'s':''} from past days still incomplete</span></div>`;
  dates.forEach(ds=>{
    const [y,m,d]=ds.split('-').map(Number);
    const td=new Date(y,m-1,d); td.setHours(0,0,0,0);
    const diff=Math.floor((today-td)/86400000);
    const dow=DAYS_SHORT[td.getDay()];
    html+=`<div class="rg">
      <div class="rg-head">
        <span class="rg-badge">${dow}, ${MONTHS[m-1]} ${d}, ${y}</span>
        <span class="rg-ago">${diff===1?'1 day ago':diff+' days ago'}</span>
      </div>`;
    map[ds].forEach(t=>{
      const tc=TAGS[t.tag]||TAGS.other;
      html+=`<div class="ri">
        <button class="rc${t.done?' ck':''}" onclick="toggleR('${t.key}')">${t.done?'✓':''}</button>
        <div>
          <div class="rt${t.done?' done':''}">${esc(t.text)}</div>
          <span class="tpill" style="background:${tc.bg};color:${tc.c};margin-top:3px;display:inline-block">${t.tag}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  rv.innerHTML=html;
}

// ── TITLE ──
function updateTitle(){
  const weeks=getWeeks(S.year,S.month);
  const w=weeks[S.week];
  const el=document.getElementById('mainTitle');
  if(w) el.innerHTML=`${MONTHS[S.month]} <span>${S.year}</span> · Week ${w.wn} (${w.start}–${w.end})`;
  else el.innerHTML=`${MONTHS[S.month]} <span>${S.year}</span>`;
}

function refresh(){ renderSidebar(); renderWeek(); renderRemaining(); updateTitle(); }

function switchTab(t){
  S.tab=t;
  document.getElementById('tabW').classList.toggle('active',t==='week');
  document.getElementById('tabR').classList.toggle('active',t==='remaining');
  document.getElementById('wview').classList.toggle('on',t==='week');
  document.getElementById('rview').classList.toggle('on',t==='remaining');
}

function chYear(d){ S.year+=d; S.week=0; refresh(); }

function addT(dk){
  const inp=document.getElementById('ai-'+dk);
  const sel=document.getElementById('ts-'+dk);
  const txt=inp.value.trim();
  if(!txt) return;
  const key=dk+'::'+uid();
  S.tasks[key]={text:txt,tag:sel.value,done:false};
  save(); inp.value=''; refresh();
}

function toggle(key){
  if(!S.tasks[key]) return;
  S.tasks[key].done=!S.tasks[key].done;
  save(); refresh();
}

function toggleR(key){
  if(!S.tasks[key]) return;
  S.tasks[key].done=!S.tasks[key].done;
  save(); refresh();
}

function del(key){
  delete S.tasks[key];
  save(); refresh();
}

// ── INIT ──
// Set initial sidebar state
if(window.innerWidth<=768){
  sidebarOpen=false;
} else {
  sidebarOpen=true;
}

refresh();

// Auto-select current week
const now=new Date();
if(S.year===now.getFullYear()&&S.month===now.getMonth()){
  const weeks=getWeeks(S.year,S.month);
  const nd=now.getDate();
  const wi=weeks.findIndex(w=>w.days.includes(nd));
  if(wi!==-1){ S.week=wi; refresh(); }
}
</script>
</body>
</html>
