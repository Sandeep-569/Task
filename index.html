<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Monthly Planner</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e8ff47">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TaskFlow">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">

  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    /* ── RESET & ROOT ── */
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --surface3: #252525;
      --accent: #e8ff47;
      --accent2: #ff6b6b;
      --accent3: #6bffd4;
      --accent4: #ffaa6b;
      --text: #f0f0f0;
      --muted: #666;
      --muted2: #3a3a3a;
      --border: rgba(255, 255, 255, 0.06);
      --border2: rgba(255, 255, 255, 0.11);
      --sb-w: 252px;
      --toggle-w: 40px;
      --header-h: 58px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Epilogue', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
      position: relative;
    }

    .sb-toggle {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
      font-size: 1rem;
    }

    .sb-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .topbar-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-title span {
      color: var(--accent);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 6px 13px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: none;
      color: var(--muted);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .tab-btn.rem-btn.has {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .tab-btn.rem-btn.has.active {
      background: var(--accent2);
      color: #fff;
      border-color: var(--accent2);
    }

    /* Google auth button */
    .auth-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: none;
      color: var(--muted);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .auth-btn:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .auth-btn img {
      width: 14px;
      height: 14px;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      object-fit: cover;
      cursor: pointer;
      flex-shrink: 0;
    }

    .user-menu {
      position: absolute;
      top: calc(var(--header-h) + 6px);
      right: 16px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 10px;
      min-width: 200px;
      z-index: 999;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
    }

    .user-menu.open {
      display: block;
    }

    .user-menu-name {
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--text);
      margin-bottom: 2px;
    }

    .user-menu-email {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .sign-out-btn {
      width: 100%;
      padding: 7px;
      background: rgba(255, 107, 107, .1);
      border: 1px solid rgba(255, 107, 107, .25);
      border-radius: 8px;
      color: var(--accent2);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.74rem;
      cursor: pointer;
      transition: all .15s;
    }

    .sign-out-btn:hover {
      background: rgba(255, 107, 107, .2);
    }

    /* ── BODY LAYOUT ── */
    .app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── OVERLAY for mobile ── */
    .sb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 199;
    }

    .sb-overlay.show {
      display: block;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sb-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--muted2) transparent;
      transition: transform .28s cubic-bezier(.4, 0, .2, 1), width .28s cubic-bezier(.4, 0, .2, 1);
      z-index: 200;
      position: relative;
    }

    /* Collapsed state */
    .sidebar.collapsed {
      width: 0;
      transform: translateX(-100%);
      overflow: hidden;
      border-right: none;
    }

    /* On mobile sidebar is absolute overlay */
    @media(max-width:768px) {
      .sidebar {
        position: fixed;
        top: var(--header-h);
        left: 0;
        height: calc(100% - var(--header-h));
        transform: translateX(-100%);
        z-index: 200;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar.collapsed {
        width: var(--sb-w);
        transform: translateX(-100%);
      }
    }

    .sb-inner {
      width: var(--sb-w);
      min-width: var(--sb-w);
    }

    .year-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .year-txt {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .yb {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 3px 8px;
      border-radius: 6px;
      transition: all .15s;
    }

    .yb:hover {
      color: var(--accent);
      background: rgba(232, 255, 71, .08);
    }

    .month-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      padding: 12px 13px;
      border-bottom: 1px solid var(--border);
    }

    .mb {
      position: relative;
      padding: 8px 4px;
      background: none;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }

    .mb:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .mb.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .mb .dot {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent2);
    }

    .week-list {
      padding: 12px 13px;
      flex: 1;
    }

    .wl-title {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .wi {
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: all .15s;
    }

    .wi:hover {
      border-color: var(--border2);
      background: var(--surface2);
    }

    .wi.active {
      border-color: var(--accent);
      background: rgba(232, 255, 71, .05);
    }

    .wi-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1px;
    }

    .wi.active .wi-label {
      color: var(--accent);
    }

    .wi-dates {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .wi-pbar {
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      margin-top: 5px;
      overflow: hidden;
    }

    .wi-pfill {
      height: 100%;
      background: var(--accent3);
      border-radius: 10px;
      transition: width .3s;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .mb-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 22px;
      scrollbar-width: thin;
      scrollbar-color: var(--muted2) transparent;
    }

    /* ── VIEWS ── */
    .wview,
    .rview {
      display: none;
    }

    .wview.on,
    .rview.on {
      display: block;
    }

    .wv-top {
      font-family: 'Syne', sans-serif;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .st {
      flex: 1;
      text-align: center;
    }

    .st-n {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 2px;
    }

    .st-l {
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* DAYS GRID */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .dc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color .2s;
    }

    .dc:hover {
      border-color: var(--border2);
    }

    .dc.today-card {
      border-color: rgba(232, 255, 71, .35);
    }

    .dc-head {
      padding: 14px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dc-dow {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .dc-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .today-card .dc-num {
      color: var(--accent);
    }

    .today-pill {
      font-size: 0.6rem;
      background: var(--accent);
      color: #000;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .dc-tasks {
      padding: 10px 14px;
      min-height: 60px;
    }

    .no-t {
      padding: 14px 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted2);
      font-style: italic;
    }

    .ti {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      animation: fi .2s ease;
    }

    .ti:last-child {
      border-bottom: none;
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(-3px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tc {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--muted2);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      font-size: 0.65rem;
      color: transparent;
    }

    .tc:hover {
      border-color: var(--accent3);
    }

    .tc.ck {
      background: var(--accent3);
      border-color: var(--accent3);
      color: #000;
    }

    .tw {
      flex: 1;
    }

    .tt {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    .tt.done {
      text-decoration: line-through;
      color: var(--muted);
    }

    .tpill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.62rem;
      font-weight: 600;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .tdel {
      background: none;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 3px 5px;
      border-radius: 4px;
      opacity: 0;
      transition: all .15s;
      flex-shrink: 0;
    }

    .ti:hover .tdel {
      opacity: 1;
    }

    .tdel:hover {
      color: var(--accent2);
    }

    /* DRAG & DROP */
    .drag-handle {
      font-size: 1rem;
      color: var(--muted2);
      cursor: grab;
      padding: 0 4px;
      flex-shrink: 0;
      user-select: none;
      display: flex;
      align-items: center;
      transition: color .15s;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .ti:hover .drag-handle {
      color: var(--muted);
    }

    .ti.dragging {
      opacity: 0.35;
      transform: scale(0.97);
      transition: opacity .15s, transform .15s;
    }

    .dc.drag-over {
      border-color: var(--accent) !important;
      background: rgba(232, 255, 71, 0.04);
      box-shadow: 0 0 0 2px rgba(232, 255, 71, 0.2);
      transition: all .15s;
    }

    .dc.drag-over .dc-tasks {
      min-height: 60px;
    }

    .drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 3px;
      margin: 4px 0;
      animation: pulse-drop .6s infinite alternate;
    }

    @keyframes pulse-drop {
      from {
        opacity: 0.5;
      }

      to {
        opacity: 1;
      }
    }

    .add-row {
      display: flex;
      gap: 6px;
      padding: 10px 14px 12px;
      border-top: 1px solid var(--border);
    }

    .ai {
      flex: 1;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color .15s;
    }

    .ai:focus {
      border-color: var(--accent);
    }

    .ai::placeholder {
      color: var(--muted2);
    }

    .ts {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 6px;
      color: var(--muted);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
      width: 82px;
    }

    .ab {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      color: #000;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: transform .1s;
      flex-shrink: 0;
    }

    .ab:hover {
      transform: scale(1.1);
    }

    /* REMAINING */
    .rem-empty {
      text-align: center;
      padding: 60px 20px;
    }

    .rem-empty-ic {
      font-size: 2.8rem;
      margin-bottom: 10px;
    }

    .rem-empty-tx {
      font-family: 'Syne', sans-serif;
      font-size: .95rem;
      color: var(--muted);
    }

    .overdue-banner {
      background: rgba(255, 107, 107, .08);
      border: 1px solid rgba(255, 107, 107, .25);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .79rem;
      color: #ffaaaa;
    }

    .overdue-banner strong {
      color: var(--accent2);
      font-size: 1.15rem;
      font-family: 'Syne', sans-serif;
    }

    .rg {
      margin-bottom: 20px;
    }

    .rg-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
    }

    .rg-badge {
      background: var(--accent2);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: .68rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .rg-ago {
      font-size: .66rem;
      color: var(--muted);
    }

    .ri {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 11px;
      background: var(--surface);
      border: 1px solid rgba(255, 107, 107, .13);
      border-left: 3px solid var(--accent2);
      border-radius: 10px;
      margin-bottom: 5px;
      animation: fi .2s ease;
    }

    .rc {
      width: 17px;
      height: 17px;
      border-radius: 5px;
      border: 1.5px solid rgba(255, 107, 107, .4);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      font-size: .56rem;
      color: transparent;
    }

    .rc:hover {
      border-color: var(--accent3);
    }

    .rc.ck {
      background: var(--accent3);
      border-color: var(--accent3);
      color: #000;
    }

    .rt {
      font-size: .78rem;
      color: var(--text);
      line-height: 1.4;
    }

    .rt.done {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* placeholder */
    .placeholder-screen {
      text-align: center;
      padding: 60px 20px;
    }

    .placeholder-screen .ic {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .placeholder-screen .tx {
      font-family: 'Syne', sans-serif;
      font-size: .95rem;
      color: var(--muted);
    }

    /* Sync status */
    .sync-badge {
      font-size: 0.62rem;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(107, 255, 212, .1);
      color: var(--accent3);
      border: 1px solid rgba(107, 255, 212, .2);
      white-space: nowrap;
    }

    .sync-badge.local {
      background: rgba(255, 170, 107, .1);
      color: var(--accent4);
      border-color: rgba(255, 170, 107, .2);
    }

    /* Auth modal */
    .auth-modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .auth-modal-bg.show {
      display: flex;
    }

    .auth-modal {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 32px 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    .auth-modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .auth-modal p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .google-signin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      background: #fff;
      border: none;
      border-radius: 10px;
      color: #333;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 10px;
    }

    .google-signin-btn:hover {
      background: #f0f0f0;
    }

    .google-signin-btn img {
      width: 18px;
      height: 18px;
    }

    .auth-skip {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .auth-skip:hover {
      color: var(--text);
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--muted2);
      border-radius: 10px;
    }

    /* Move to date modal */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .modal-bg.show {
      display: flex;
    }

    .modal-box {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--text);
    }

    /* Move button on task item */
    .tmove {
      background: none;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 3px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: all .15s;
      flex-shrink: 0;
    }

    .ti:hover .tmove {
      opacity: 1;
    }

    .tmove:hover {
      color: var(--accent);
    }

    @media(hover:none) {
      .tmove {
        opacity: 0.6;
      }

      .tdel {
        opacity: 0.6;
      }
    }

    /* Day picker grid */
    .move-day-btn {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 2px;
      font-size: 0.72rem;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }

    .move-day-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .move-day-btn.today-day {
      border-color: rgba(232, 255, 71, .4);
      color: var(--accent);
    }

    .move-day-btn.selected {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    /* ── EXAM VIEW ── */
    .eview {
      display: none;
      padding: 20px;
      overflow-y: auto;
      height: 100%;
    }

    .eview.on {
      display: block;
    }

    /* Add Exam Form */
    .exam-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .exam-form-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .exam-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .exam-field label {
      font-size: 0.68rem;
      color: var(--muted);
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .exam-field input,
    .exam-field select {
      width: 100%;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.82rem;
      outline: none;
      transition: border-color .15s;
    }

    .exam-field input:focus,
    .exam-field select:focus {
      border-color: var(--accent);
    }

    .exam-field input::placeholder {
      color: var(--muted2);
    }

    .exam-tbd-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
    }

    .exam-tbd-row input[type=checkbox] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    .exam-add-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      color: #000;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .1s, opacity .15s;
      width: 100%;
    }

    .exam-add-btn:hover {
      opacity: 0.9;
      transform: scale(1.01);
    }

    /* Exam type colors */
    .etype-midterm {
      background: rgba(232, 255, 71, .12);
      color: #e8ff47;
      border-color: rgba(232, 255, 71, .25);
    }

    .etype-endterm {
      background: rgba(255, 107, 107, .12);
      color: #ff6b6b;
      border-color: rgba(255, 107, 107, .25);
    }

    .etype-lab {
      background: rgba(107, 179, 255, .12);
      color: #6bb3ff;
      border-color: rgba(107, 179, 255, .25);
    }

    .etype-viva {
      background: rgba(107, 255, 212, .12);
      color: #6bffd4;
      border-color: rgba(107, 255, 212, .25);
    }

    .etype-assignment {
      background: rgba(255, 170, 107, .12);
      color: #ffaa6b;
      border-color: rgba(255, 170, 107, .25);
    }

    /* Exam Table */
    .exam-section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin: 20px 0 10px;
    }

    .exam-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    .exam-table th {
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .exam-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .exam-table tr:last-child td {
      border-bottom: none;
    }

    .exam-table tr:hover td {
      background: rgba(255, 255, 255, .02);
    }

    .exam-name-cell {
      font-size: 0.85rem;
      font-weight: 500;
    }

    .exam-type-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      border: 1px solid;
    }

    .exam-countdown {
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .exam-countdown.urgent {
      color: var(--accent2);
      animation: pulse-urgent 1.2s infinite alternate;
    }

    .exam-countdown.soon {
      color: var(--accent4);
    }

    .exam-countdown.ok {
      color: var(--accent3);
    }

    .exam-countdown.past {
      color: var(--muted);
    }

    @keyframes pulse-urgent {
      from {
        opacity: 1;
      }

      to {
        opacity: 0.5;
      }
    }

    .exam-del-btn {
      background: none;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all .15s;
    }

    .exam-del-btn:hover {
      color: var(--accent2);
    }

    .exam-empty {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* Horizontal scrollable calendar */
    .exam-cal-section {
      margin-top: 8px;
    }

    .exam-cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .exam-cal-month {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
    }

    .exam-cal-nav {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: var(--text);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .exam-cal-nav:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .exam-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .exam-cal-dow {
      text-align: center;
      font-size: 0.58rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      padding: 6px 0;
    }

    .exam-cal-day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 0.75rem;
      cursor: default;
      transition: background .15s;
      background: var(--surface);
      border: 1px solid transparent;
    }

    .exam-cal-day.empty {
      background: transparent;
      border: none;
    }

    .exam-cal-day.today {
      border-color: rgba(232, 255, 71, .4);
      color: var(--accent);
      font-weight: 700;
    }

    .exam-cal-day.has-exam {
      background: var(--surface2);
      border-color: var(--border2);
      cursor: pointer;
    }

    .exam-cal-day.has-exam:hover {
      border-color: var(--accent3);
    }

    .exam-cal-day.past-day {
      opacity: 0.4;
    }

    .exam-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .exam-cal-day .exam-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.65rem;
      color: var(--text);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
      z-index: 20;
      text-align: left;
      min-width: 120px;
    }

    .exam-cal-day:hover .exam-tooltip {
      opacity: 1;
    }

    @media(max-width:768px) {
      .exam-form-grid {
        grid-template-columns: 1fr;
      }

      .exam-table th:nth-child(3),
      .exam-table td:nth-child(3) {
        display: none;
      }
    }

    @media(max-width:480px) {

      .exam-table th:nth-child(4),
      .exam-table td:nth-child(4) {
        display: none;
      }
    }

    /* Tablet */
    @media(max-width:1024px) {
      .days-grid {
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      }

      .mb-body {
        padding: 16px 16px;
      }
    }

    /* Mobile large */
    @media(max-width:768px) {
      :root {
        --header-h: 52px;
      }

      .topbar-title {
        font-size: 0.78rem;
      }

      .tab-btn {
        padding: 5px 10px;
        font-size: 0.68rem;
      }

      .auth-btn {
        padding: 5px 9px;
        font-size: 0.68rem;
      }

      .days-grid {
        grid-template-columns: 1fr;
      }

      .mb-body {
        padding: 14px 14px;
      }

      .stats-row {
        gap: 6px;
        padding: 12px 12px;
      }

      .st-n {
        font-size: 1.2rem;
      }

      .st-l {
        font-size: 0.6rem;
      }

      .dc-head {
        padding: 14px 16px;
      }

      .dc-num {
        font-size: 1.6rem;
      }

      .dc-tasks {
        padding: 10px 14px;
        min-height: 70px;
      }

      .tt {
        font-size: 0.9rem;
      }

      .tc {
        width: 24px;
        height: 24px;
      }

      .ai {
        font-size: 0.9rem;
        padding: 10px 12px;
      }

      .ts {
        font-size: 0.78rem;
        padding: 10px 6px;
        width: 88px;
      }

      .ab {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }

      .add-row {
        padding: 10px 14px 14px;
        gap: 7px;
      }
    }

    /* Mobile small */
    @media(max-width:480px) {
      .topbar {
        padding: 0 10px;
        gap: 8px;
      }

      .topbar-logo {
        font-size: 0.95rem;
      }

      .tab-btn span.tab-text {
        display: none;
      }

      .tab-btn.active span.tab-icon {
        display: inline;
      }

      .auth-btn .auth-label {
        display: none;
      }

      .mb-body {
        padding: 10px 10px;
      }

      .stats-row {
        flex-wrap: wrap;
      }

      .st {
        min-width: 45%;
      }

      .dc-num {
        font-size: 1.8rem;
      }

      .tt {
        font-size: 0.95rem;
      }
    }

    /* Very small */
    @media(max-width:360px) {
      .topbar-title {
        display: none;
      }

      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
    }

    /* ── POMODORO VIEW ── */
    .pview {
      display: none;
    }

    .pview.on {
      display: block;
    }

    .pomo-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    /* Mode selector */
    .pomo-modes {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px;
    }

    .pomo-mode-btn {
      flex: 1;
      padding: 9px 8px;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--muted);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
    }

    .pomo-mode-btn.active {
      background: var(--surface3);
      color: var(--text);
    }

    .pomo-mode-btn.work.active {
      color: var(--accent);
    }

    .pomo-mode-btn.sbreak.active {
      color: var(--accent3);
    }

    .pomo-mode-btn.lbreak.active {
      color: var(--accent4);
    }

    /* Timer circle */
    .pomo-circle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    .pomo-svg-wrap {
      position: relative;
      width: 220px;
      height: 220px;
    }

    .pomo-svg {
      width: 220px;
      height: 220px;
      transform: rotate(-90deg);
    }

    .pomo-track {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 10;
    }

    .pomo-prog {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset .8s ease, stroke .4s;
    }

    .pomo-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .pomo-time {
      font-family: 'Syne', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .pomo-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* Controls */
    .pomo-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .pomo-btn {
      padding: 11px 28px;
      border-radius: 12px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }

    .pomo-btn.start {
      background: var(--accent);
      color: #000;
    }

    .pomo-btn.start:hover {
      transform: scale(1.04);
    }

    .pomo-btn.pause {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
    }

    .pomo-btn.pause:hover {
      border-color: var(--accent);
    }

    .pomo-btn.reset {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 11px 16px;
    }

    .pomo-btn.reset:hover {
      color: var(--accent2);
      border-color: var(--accent2);
    }

    .pomo-skip {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 11px 16px;
      border-radius: 12px;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all .15s;
    }

    .pomo-skip:hover {
      color: var(--accent3);
      border-color: var(--accent3);
    }

    /* Session dots */
    .pomo-sessions {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      align-items: center;
    }

    .pomo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted2);
      transition: all .3s;
    }

    .pomo-dot.done {
      background: var(--accent);
    }

    .pomo-dot.current {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      transform: scale(1.2);
    }

    .pomo-session-lbl {
      font-size: 0.68rem;
      color: var(--muted);
      margin-left: 6px;
    }

    /* Settings */
    .pomo-settings {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .pomo-settings-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .pomo-settings-title span {
      margin-left: auto;
      font-size: 0.8rem;
    }

    .pomo-settings-body {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .pomo-settings-body.hidden {
      display: none;
    }

    .pomo-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .pomo-field label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .pomo-field-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pomo-inp {
      width: 64px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    .pomo-inp:focus {
      border-color: var(--accent);
    }

    .pomo-field label.unit {
      font-size: 0.65rem;
      color: var(--muted2);
      text-transform: none;
      letter-spacing: 0;
    }

    .pomo-apply {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #000;
      font-family: 'Epilogue', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      align-self: flex-end;
    }

    /* Analysis section */
    .pomo-analysis {
      margin-top: 8px;
    }

    .pomo-analysis-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .pan-tab {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: none;
      color: var(--muted);
      font-family: 'Epilogue', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .pan-tab.active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border2);
    }

    .pomo-stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .pomo-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .pomo-stat-n {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

      pointer-events: none;

      z-index: 10;

      display: flex;
      gap: 2px;

      flex-shrink: 0;

      width: 34px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;

    .exam-cal-btn:hover {

    .exam-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);

    .exam-cal-dow {
      text-align: center;
      font-size: 0.58rem;

      text-transform: uppercase;

    .exam-cal-day {
      min-height: 52px;
      border-radius: 10px;

      flex-direction: column;
      align-items: center;

      font-size: 0.78rem;
      color: var(--text);

      border: 1px solid transparent;

    .exam-cal-day.past-cal {
      color: var(--muted2);
    }

    .exam-cal-day.empty {
      background: none;
      border: none;

    .exam-dot-wrap {

    .exam-cal-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.65rem;
      color: var(--text);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
      z-index: 20;
      min-width: 130px;
      text-align: center;

    .exam-cal-day.has-exam:hover .exam-cal-tooltip {

    @media(max-width:768px) {
      .exam-form-grid {
        grid-template-columns: 1fr;
      }

      .eview {

        font-size: 0.72rem;
      }
    }
  </style>
</head>

<body>

      apiKey: "AIzaSyCEcBcaC-sMySDbGGT-H9FFcRjBYkb4h20",
      authDomain: "task-manager-73115.firebaseapp.com",
      projectId: "task-manager-73115",
      storageBucket: "task-manager-73115.firebasestorage.app",
      messagingSenderId: "117915873119",
      appId: "1:117915873119:web:4a3f6d44b87aba307110ea"
    };

    let app, auth, db, currentUser = null, unsubSnap = null, unsubExamSnap = null,
