          alt="avatar" onclick="toggleUserMenu()">
      `;
          document.getElementById('umName').textContent = user.displayName || 'User';
          document.getElementById('umEmail').textContent = user.email || '';
          document.getElementById('syncBadge').textContent = '☁ Synced';
          document.getElementById('syncBadge').classList.remove('local');

          // Subscribe to Firestore realtime updates: TASKS
          if (unsubSnap) unsubSnap();
          const ref = doc(db, 'users', user.uid, 'data', 'tasks');
          unsubSnap = onSnapshot(ref, snap => {
            if (_isSavingToCloud) return;
            if (snap.exists()) {
              const cloudData = snap.data();
              const cloudTasks = cloudData.tasks || {};
              const cloudTs = cloudData.updatedAt ? new Date(cloudData.updatedAt).getTime() : 0;
              const localTasks = JSON.parse(localStorage.getItem('tf_tasks') || '{}');
              const localTs = parseInt(localStorage.getItem('tf_tasks_ts') || '0', 10);
              // Merge: keep all keys from both sides; winner on conflict = whoever is newer
              const merged = cloudTs >= localTs
                ? { ...localTasks, ...cloudTasks }
                : { ...cloudTasks, ...localTasks };
              localStorage.setItem('tf_tasks', JSON.stringify(merged));
              localStorage.setItem('tf_tasks_ts', String(cloudTs || Date.now()));
              S.tasks = merged;
              refresh();
            }
          });

          // Subscribe to Firestore realtime updates: EXAMS
          if (unsubExamSnap) unsubExamSnap();
          const examRef = doc(db, 'users', user.uid, 'data', 'exams');
          unsubExamSnap = onSnapshot(examRef, snap => {
            if (_isSavingExamsToCloud) return;
            if (snap.exists()) {
              const cloudExams = snap.data().exams || [];
              localStorage.setItem('tf_exams', JSON.stringify(cloudExams));
              if (typeof EX !== 'undefined') {
                EX = cloudExams;
                if (typeof renderExam === 'function') renderExam();
                if (typeof updateExamBadge === 'function') updateExamBadge();
              }
            }
          });
        } else {
          currentUser = null;
          if (unsubSnap) { unsubSnap(); unsubSnap = null; }
          if (unsubExamSnap) { unsubExamSnap(); unsubExamSnap = null; }
          document.getElementById('authArea').innerHTML = `
        <button class="auth-btn" onclick="showAuthModal()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" style="width:14px;height:14px;">
          <span class="auth-label">Sign in</span>
        </button>`;
          document.getElementById('syncBadge').textContent = '💾 Local';
          document.getElementById('syncBadge').classList.add('local');
        }
      });

      // Expose to window for onclick handlers
      window._fbSignIn = async () => {
        const provider = new GoogleAuthProvider();
        try { await signInWithPopup(auth, provider); hideAuthModal(); }
        catch (e) { console.error(e); }
      };

      window._fbSignOut = async () => {
        try { await fbSignOut(auth); }
        catch (e) { console.error(e); }
        document.getElementById('userMenu').classList.remove('open');
      };

      window._saveToCloud = async (tasks) => {
        if (!currentUser || !db) return;
        try {
          _isSavingToCloud = true;
          const now = new Date().toISOString();
          const ref = doc(db, 'users', currentUser.uid, 'data', 'tasks');
          await setDoc(ref, { tasks, updatedAt: now });
          localStorage.setItem('tf_tasks_ts', String(new Date(now).getTime()));
          setTimeout(() => { _isSavingToCloud = false; }, 1500);
        } catch (e) { _isSavingToCloud = false; console.warn('Cloud save failed:', e); }
      };

      // ── SAVE EXAMS TO CLOUD ──
      window._saveExamsToCloud = async (exams) => {
        if (!currentUser || !db) return;
        try {
          _isSavingExamsToCloud = true;
          const ref = doc(db, 'users', currentUser.uid, 'data', 'exams');
          await setDoc(ref, { exams, updatedAt: new Date().toISOString() });
          setTimeout(() => { _isSavingExamsToCloud = false; }, 1500);
        } catch (e) { _isSavingExamsToCloud = false; console.warn('Exam cloud save failed:', e); }
      };

    } catch (e) {
      console.warn('Firebase not configured. Running in local-only mode.', e);
      window._fbSignIn = () => {
        alert('Firebase is not configured yet.\n\nTo enable Google sign-in:\n1. Create a project at console.firebase.google.com\n2. Enable Authentication → Google\n3. Enable Firestore Database\n4. Replace the firebaseConfig values in this file.');
        hideAuthModal();
      };
      window._fbSignOut = () => { };
      window._saveToCloud = () => { };
      window._saveExamsToCloud = () => { };
    }
  </script>

  <script>
    // ── CONSTANTS ──
    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const DAYS_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const TAGS = {
      work: { bg: 'rgba(107,255,212,.15)', c: '#6bffd4' },
      study: { bg: 'rgba(232,255,71,.15)', c: '#e8ff47' },
      health: { bg: 'rgba(107,179,255,.15)', c: '#6bb3ff' },
      personal: { bg: 'rgba(255,170,107,.15)', c: '#ffaa6b' },
      other: { bg: 'rgba(200,200,200,.1)', c: '#aaa' },
    };

    // ── STATE ──
    let S = {
      year: new Date().getFullYear(),
      month: new Date().getMonth(),
      week: 0,
      tab: 'week',
      tasks: JSON.parse(localStorage.getItem('tf_tasks') || '{}'),
    };

    // Sidebar open/closed state
    let sidebarOpen = window.innerWidth > 768;

    // ── HELPERS ──
    function save() {
      localStorage.setItem('tf_tasks', JSON.stringify(S.tasks));
      if (window._saveToCloud) window._saveToCloud(S.tasks);
    }
    function dKey(y, m, d) { return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    // ── WEEK CALCULATION ──
    // Fixed: Week 1 = days 1-7, Week 2 = 8-14, Week 3 = 15-21, Week 4 = 22-28, Week 5 = 29-end
    function getWeeks(y, m) {
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const weeks = [];
      let day = 1, wn = 1;
      while (day <= daysInMonth) {
        const end = Math.min(day + 6, daysInMonth);
        const days = [];
        for (let d = day; d <= end; d++) days.push(d);
        weeks.push({ wn, start: day, end, days });
        day = end + 1;
        wn++;
      }
      return weeks;
    }

    function getTasksFor(dk) {
      return Object.entries(S.tasks)
        .filter(([k]) => k.startsWith(dk + '::'))
        .map(([k, v]) => ({ key: k, ...v }));
    }

    // ── SIDEBAR TOGGLE ──
    function toggleSidebar() {
      const isMobile = window.innerWidth <= 768;
      if (isMobile) {
        sidebarOpen = !sidebarOpen;
        document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
        document.getElementById('sbOverlay').classList.toggle('show', sidebarOpen);
      } else {
        sidebarOpen = !sidebarOpen;
        document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
      }
    }

    function closeSidebarMobile() {
      sidebarOpen = false;
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sbOverlay').classList.remove('show');
    }

    // Handle resize
    window.addEventListener('resize', () => {
      const isMobile = window.innerWidth <= 768;
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('sbOverlay');
      if (!isMobile) {
        sb.classList.remove('open');
        ov.classList.remove('show');
        if (sidebarOpen) sb.classList.remove('collapsed');
      } else {
        sb.classList.remove('collapsed');
        if (!sidebarOpen) { sb.classList.remove('open'); ov.classList.remove('show'); }
      }
    });

    // ── AUTH ──
    function showAuthModal() { document.getElementById('authModalBg').classList.add('show'); }
    function hideAuthModal() { document.getElementById('authModalBg').classList.remove('show'); }
    function signInWithGoogle() { if (window._fbSignIn) window._fbSignIn(); }
    function signOut() { if (window._fbSignOut) window._fbSignOut(); }
    function toggleUserMenu() {
      document.getElementById('userMenu').classList.toggle('open');
    }
    document.addEventListener('click', e => {
      const um = document.getElementById('userMenu');
      if (um.classList.contains('open') && !um.contains(e.target) && !e.target.closest('#userAvatar')) {
        um.classList.remove('open');
      }
    });

    // ── RENDER SIDEBAR ──
    function renderSidebar() {
      document.getElementById('yearLbl').textContent = S.year;

      const mg = document.getElementById('monthGrid');
      mg.innerHTML = '';
      MONTHS.forEach((nm, i) => {
        const b = document.createElement('button');
        b.className = 'mb' + (i === S.month ? ' active' : '');
        const pfx = `${S.year}-${String(i + 1).padStart(2, '0')}-`;
        if (Object.keys(S.tasks).some(k => k.startsWith(pfx))) {
          const dot = document.createElement('div'); dot.className = 'dot'; b.appendChild(dot);
        }
        b.appendChild(document.createTextNode(nm.slice(0, 3)));
        b.onclick = () => { S.month = i; S.week = 0; refresh(); };
        mg.appendChild(b);
      });

      const wl = document.getElementById('weekList');
      wl.innerHTML = '';
      const weeks = getWeeks(S.year, S.month);
      if (!weeks.length) return;
      const title = document.createElement('div'); title.className = 'wl-title';
      title.textContent = MONTHS[S.month] + ' Weeks';
      wl.appendChild(title);
      weeks.forEach((w, wi) => {
        let tot = 0, dn = 0;
        w.days.forEach(d => { const ts = getTasksFor(dKey(S.year, S.month, d)); tot += ts.length; dn += ts.filter(t => t.done).length; });
        const pct = tot > 0 ? Math.round(dn / tot * 100) : 0;
        const el = document.createElement('div');
        el.className = 'wi' + (wi === S.week ? ' active' : '');
        el.innerHTML = `<div class="wi-label">Week ${w.wn} <span style="font-weight:400;color:var(--muted);font-size:0.65rem">(${w.start}–${w.end})</span></div><div class="wi-dates">${MONTHS[S.month].slice(0, 3)} ${w.start} – ${MONTHS[S.month].slice(0, 3)} ${w.end}</div><div class="wi-pbar"><div class="wi-pfill" style="width:${pct}%"></div></div>`;
        el.onclick = () => { S.week = wi; switchTab('week'); refresh(); if (window.innerWidth <= 768) closeSidebarMobile(); };
        wl.appendChild(el);
      });
    }

    // ── BUILD TASK ITEM HTML ──
    function taskItemHTML(t) {
      const tc = TAGS[t.tag] || TAGS.other;
      const sk = t.key.replace(/:/g, '_');
      return `<div class="ti" id="ti-${sk}" draggable="true" ondragstart="dragStart(event,'${t.key}')" ondragend="dragEnd(event)">
    <div class="drag-handle" title="Drag to another day">⠿</div>
    <button class="tc${t.done ? ' ck' : ''}" onclick="toggle('${t.key}')">${t.done ? '✓' : ''}</button>
    <div class="tw">
      <div class="tt${t.done ? ' done' : ''}">${esc(t.text)}</div>
      <span class="tpill" style="background:${tc.bg};color:${tc.c}">${t.tag}</span>
    </div>
    <button class="tmove" onclick="openMoveDateModal('${t.key}')" title="Move to another date">📅</button>
    <button class="tdel" onclick="del('${t.key}')">✕</button>
  </div>`;
    }

    // ── BUILD DAY CARD HTML ──
    function dayCardHTML(d, todayStr) {
      const dk = dKey(S.year, S.month, d);
      const dow = new Date(S.year, S.month, d).getDay();
      const isToday = dk === todayStr;
      const tasks = getTasksFor(dk);
      let html = `<div class="dc${isToday ? ' today-card' : ''}" id="dc-${dk}"
    ondragover="dragOver(event,'${dk}')"
    ondragleave="dragLeave(event,'${dk}')"
    ondrop="dropTask(event,'${dk}')">
    <div class="dc-head">
      <div><div class="dc-dow">${DAYS_SHORT[dow]}</div><div class="dc-num">${d}</div></div>
      ${isToday ? '<span class="today-pill">Today</span>' : ''}
    </div>
    <div class="dc-tasks" id="dct-${dk}">`;
      if (!tasks.length) { html += `<div class="no-t">Drop tasks here or add new</div>`; }
      else tasks.forEach(t => { html += taskItemHTML(t); });
      html += `</div>
    <div class="add-row">
      <input class="ai" id="ai-${dk}" placeholder="Add task..." onkeydown="if(event.key==='Enter')addT('${dk}')">
      <select class="ts" id="ts-${dk}">
        <option value="study">Study</option>
        <option value="work">Work</option>
        <option value="health">Health</option>
        <option value="personal">Personal</option>
        <option value="other">Other</option>
      </select>
      <button class="ab" onclick="addT('${dk}')">+</button>
    </div>
  </div>`;
      return html;
    }

    // ── UPDATE STATS ROW ONLY ──
    function updateStats() {
      const weeks = getWeeks(S.year, S.month);
      const w = weeks[S.week];
      if (!w) return;
      let tot = 0, dn = 0;
      w.days.forEach(d => { const ts = getTasksFor(dKey(S.year, S.month, d)); tot += ts.length; dn += ts.filter(t => t.done).length; });
      const sr = document.getElementById('statsRow');
      if (!sr) return;
      sr.innerHTML = `
    <div class="st"><div class="st-n" style="color:var(--accent)">${tot}</div><div class="st-l">Total</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent3)">${dn}</div><div class="st-l">Done</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent2)">${tot - dn}</div><div class="st-l">Left</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent4)">${tot > 0 ? Math.round(dn / tot * 100) : 0}%</div><div class="st-l">Rate</div></div>`;
    }

    // ── RENDER WEEK VIEW (full build, called on week/month change) ──
    function renderWeek() {
      const wv = document.getElementById('wview');
      const weeks = getWeeks(S.year, S.month);
      const w = weeks[S.week];
      if (!w) { wv.innerHTML = `<div class="placeholder-screen"><div class="ic">📅</div><div class="tx">Select a month &amp; week from the sidebar</div></div>`; return; }

      const todayStr = dKey(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
      let tot = 0, dn = 0;
      w.days.forEach(d => { const ts = getTasksFor(dKey(S.year, S.month, d)); tot += ts.length; dn += ts.filter(t => t.done).length; });

      let html = `<div class="wv-top">${MONTHS[S.month]} ${w.start}–${w.end}, ${S.year}</div>
  <div class="stats-row" id="statsRow">
    <div class="st"><div class="st-n" style="color:var(--accent)">${tot}</div><div class="st-l">Total</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent3)">${dn}</div><div class="st-l">Done</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent2)">${tot - dn}</div><div class="st-l">Left</div></div>
    <div class="st"><div class="st-n" style="color:var(--accent4)">${tot > 0 ? Math.round(dn / tot * 100) : 0}%</div><div class="st-l">Rate</div></div>
  </div>
  <div class="days-grid">`;
      w.days.forEach(d => { html += dayCardHTML(d, todayStr); });
      html += `</div>`;
      wv.innerHTML = html;
    }

    // ── SURGICAL UPDATE: refresh just one day card's task list ──
    function refreshDayCard(dk) {
      const container = document.getElementById('dct-' + dk);
      if (!container) return;
      const tasks = getTasksFor(dk);
      if (!tasks.length) { container.innerHTML = `<div class="no-t">No tasks yet</div>`; return; }
      container.innerHTML = '';
      tasks.forEach(t => {
        const div = document.createElement('div');
        div.outerHTML; // just for the createElement pattern
        container.insertAdjacentHTML('beforeend', taskItemHTML(t));
      });
    }

    // ── RENDER REMAINING ──
    function renderRemaining() {
      const rv = document.getElementById('rview');
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const map = {};

      Object.entries(S.tasks).forEach(([key, task]) => {
        if (task.done) return;
        const ds = key.split('::')[0];
        const [y, m, d] = ds.split('-').map(Number);
        const td = new Date(y, m - 1, d); td.setHours(0, 0, 0, 0);
        if (td < today) { if (!map[ds]) map[ds] = []; map[ds].push({ key, ...task }); }
      });

      const dates = Object.keys(map).sort();
      const total = dates.reduce((a, d) => a + map[d].length, 0);

      const tabR = document.getElementById('tabR');
      if (total > 0) { tabR.classList.add('has'); tabR.querySelector('.tab-text').textContent = ` Remaining (${total})`; }
      else { tabR.classList.remove('has'); tabR.querySelector('.tab-text').textContent = ' Remaining'; }

      if (!dates.length) { rv.innerHTML = `<div class="rem-empty"><div class="rem-empty-ic">✅</div><div class="rem-empty-tx">All caught up! No overdue tasks.</div></div>`; return; }

      let html = `<div class="overdue-banner"><strong>${total}</strong><span>overdue task${total !== 1 ? 's' : ''} from past days still incomplete</span></div>`;
      dates.forEach(ds => {
        const [y, m, d] = ds.split('-').map(Number);
        const td = new Date(y, m - 1, d); td.setHours(0, 0, 0, 0);
        const diff = Math.floor((today - td) / 86400000);
        const dow = DAYS_SHORT[td.getDay()];
        html += `<div class="rg">
      <div class="rg-head">
        <span class="rg-badge">${dow}, ${MONTHS[m - 1]} ${d}, ${y}</span>
        <span class="rg-ago">${diff === 1 ? '1 day ago' : diff + ' days ago'}</span>
      </div>`;
        map[ds].forEach(t => {
          const tc = TAGS[t.tag] || TAGS.other;
          html += `<div class="ri">
        <button class="rc${t.done ? ' ck' : ''}" onclick="toggleR('${t.key}')">${t.done ? '✓' : ''}</button>
        <div>
          <div class="rt${t.done ? ' done' : ''}">${esc(t.text)}</div>
          <span class="tpill" style="background:${tc.bg};color:${tc.c};margin-top:3px;display:inline-block">${t.tag}</span>
        </div>
      </div>`;
        });
        html += `</div>`;
      });
      rv.innerHTML = html;
    }

    // ── TITLE ──
    function updateTitle() {
      const weeks = getWeeks(S.year, S.month);
      const w = weeks[S.week];
      const el = document.getElementById('mainTitle');
      if (w) el.innerHTML = `${MONTHS[S.month]} <span>${S.year}</span> · Week ${w.wn} (${w.start}–${w.end})`;
      else el.innerHTML = `${MONTHS[S.month]} <span>${S.year}</span>`;
    }

    function refresh() { renderSidebar(); renderWeek(); renderRemaining(); updateTitle(); }

    function switchTab(t) {
      S.tab = t;
      document.getElementById('tabW').classList.toggle('active', t === 'week');
      document.getElementById('tabR').classList.toggle('active', t === 'remaining');
      document.getElementById('tabP').classList.toggle('active', t === 'pomodoro');
      document.getElementById('tabE').classList.toggle('active', t === 'exam');
      document.getElementById('wview').classList.toggle('on', t === 'week');
      document.getElementById('rview').classList.toggle('on', t === 'remaining');
      document.getElementById('pview').classList.toggle('on', t === 'pomodoro');
      document.getElementById('eview').classList.toggle('on', t === 'exam');
      if (t === 'pomodoro') {
        renderPomodoro();
        if (window.innerWidth <= 768) closeSidebarMobile();
      }
      if (t === 'exam') {
        renderExam();
        if (window.innerWidth <= 768) closeSidebarMobile();
      }
    }

    function chYear(d) { S.year += d; S.week = 0; refresh(); }

    function addT(dk) {
      const inp = document.getElementById('ai-' + dk);
      const sel = document.getElementById('ts-' + dk);
      const txt = inp.value.trim();
      if (!txt) return;
      const key = dk + '::' + uid();
      S.tasks[key] = { text: txt, tag: sel.value, done: false };
      save();
      inp.value = '';
      inp.focus();
      // Surgical: just update this day's task list + stats
      refreshDayCard(dk);
      updateStats();
      updateSidebarProgress();
      updateRemainingBadge();
    }

    function toggle(key) {
      if (!S.tasks[key]) return;
      S.tasks[key].done = !S.tasks[key].done;
      save();
      const dk = key.split('::')[0];
      // Update just the task item in place
      const sk = key.replace(/:/g, '_');
      const el = document.getElementById('ti-' + sk);
      if (el) {
        const t = S.tasks[key];
        const tc = TAGS[t.tag] || TAGS.other;
        const btn = el.querySelector('.tc');
        const tt = el.querySelector('.tt');
        if (t.done) { btn.classList.add('ck'); btn.textContent = '✓'; tt.classList.add('done'); }
        else { btn.classList.remove('ck'); btn.textContent = ''; tt.classList.remove('done'); }
      }
      updateStats();
      updateSidebarProgress();
      updateRemainingBadge();
    }

    function toggleR(key) {
      if (!S.tasks[key]) return;
      S.tasks[key].done = !S.tasks[key].done;
      save();
      // Full remaining re-render (it's a separate view, acceptable)
      renderRemaining();
      updateStats();
      updateSidebarProgress();
      // Also update in week view if visible
      const dk = key.split('::')[0];
      refreshDayCard(dk);
    }

    function del(key) {
      const dk = key.split('::')[0];
      delete S.tasks[key];
      save();
      const sk = key.replace(/:/g, '_');
      const el = document.getElementById('ti-' + sk);
      if (el) {
        el.style.transition = 'opacity .15s, transform .15s';
        el.style.opacity = '0';
        el.style.transform = 'translateX(8px)';
        setTimeout(() => { refreshDayCard(dk); updateStats(); updateSidebarProgress(); updateRemainingBadge(); }, 150);
      } else {
        refreshDayCard(dk); updateStats(); updateSidebarProgress(); updateRemainingBadge();
      }
    }

    // ── DRAG & DROP ──
    let _dragKey = null;

    function dragStart(event, key) {
      _dragKey = key;
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', key);
      const el = event.currentTarget;
      setTimeout(() => { el.classList.add('dragging'); }, 0);
    }

    function dragEnd(event) {
      event.currentTarget.classList.remove('dragging');
      // Remove all drag-over highlights
      document.querySelectorAll('.dc.drag-over').forEach(el => el.classList.remove('drag-over'));
      _dragKey = null;
    }

    function dragOver(event, targetDk) {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      const card = document.getElementById('dc-' + targetDk);
      if (card) card.classList.add('drag-over');
    }

    function dragLeave(event, targetDk) {
      // Only remove if truly leaving the card (not entering a child)
      if (!event.currentTarget.contains(event.relatedTarget)) {
        const card = document.getElementById('dc-' + targetDk);
        if (card) card.classList.remove('drag-over');
      }
    }

    function dropTask(event, targetDk) {
      event.preventDefault();
      const card = document.getElementById('dc-' + targetDk);
      if (card) card.classList.remove('drag-over');

      const key = _dragKey || event.dataTransfer.getData('text/plain');
      if (!key || !S.tasks[key]) return;

      const sourceDk = key.split('::')[0];
      if (sourceDk === targetDk) return; // same day, no move

      // Move: create new key with target date, copy task data
      const taskData = { ...S.tasks[key] };
      const newKey = targetDk + '::' + uid();
      S.tasks[newKey] = taskData;
      delete S.tasks[key];
      save();

      // Update both source and target day cards
      refreshDayCard(sourceDk);
      refreshDayCard(targetDk);
      updateStats();
      updateSidebarProgress();
      updateRemainingBadge();

      // Show toast
      showToastMsg(`✅ Task moved to ${targetDk.split('-').slice(1).join('/')}!`);
    }

    function showToastMsg(msg) {
      let t = document.getElementById('dragToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'dragToast';
        t.className = 'pomo-toast';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── MOVE TO DATE MODAL ──
    let _moveTaskKey = null;
    let _moveSelectedDay = null;

    function openMoveDateModal(key) {
      _moveTaskKey = key;
      _moveSelectedDay = null;
      const sourceDk = key.split('::')[0];
      const taskText = S.tasks[key]?.text || '';

      // Set preview text
      document.getElementById('moveTaskPreview').textContent = `"${taskText}" — currently on ${sourceDk}`;

      // Set month/year selectors to current state
      const monthSel = document.getElementById('moveDateMonth');
      const yearSel = document.getElementById('moveDateYear');
      monthSel.value = S.month;
      yearSel.value = S.year;

      // Build day grid
      buildMoveDayGrid();

      // Listen for month/year change
      monthSel.onchange = buildMoveDayGrid;
      yearSel.onchange = buildMoveDayGrid;

      document.getElementById('moveDateBg').classList.add('show');
    }

    function buildMoveDayGrid() {
      const month = parseInt(document.getElementById('moveDateMonth').value);
      const year = parseInt(document.getElementById('moveDateYear').value);
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      const todayKey = dKey(today.getFullYear(), today.getMonth(), today.getDate());

      let html = '';
      for (let d = 1; d <= daysInMonth; d++) {
        const dk = dKey(year, month, d);
        const isToday = dk === todayKey;
        const isSelected = dk === _moveSelectedDay;
        const dow = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'][new Date(year, month, d).getDay()];
        html += `<div class="move-day-btn${isToday ? ' today-day' : ''}${isSelected ? ' selected' : ''}"
      onclick="selectMoveDay('${dk}', this)">
      <div style="font-size:0.5rem;color:inherit;opacity:0.7">${dow}</div>
      <div>${d}</div>
    </div>`;
      }
      document.getElementById('moveDateDays').innerHTML = html;
    }

    function selectMoveDay(dk, el) {
      _moveSelectedDay = dk;
      // Highlight selected
      document.querySelectorAll('.move-day-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      // Auto confirm after short delay
      setTimeout(() => confirmMoveTask(), 200);
    }

    function confirmMoveTask() {
      if (!_moveTaskKey || !_moveSelectedDay) return;
      if (!S.tasks[_moveTaskKey]) return;

      const sourceDk = _moveTaskKey.split('::')[0];
      if (sourceDk === _moveSelectedDay) {
        closeMoveDateModal();
        return;
      }

      // Move task
      const taskData = { ...S.tasks[_moveTaskKey] };
      const newKey = _moveSelectedDay + '::' + uid();
      S.tasks[newKey] = taskData;
      delete S.tasks[_moveTaskKey];
      save();

      // Refresh UI
      refreshDayCard(sourceDk);
      refreshDayCard(_moveSelectedDay);
      updateStats();
      updateSidebarProgress();
      updateRemainingBadge();

      closeMoveDateModal();

      // Format date nicely for toast
      const [y, m, d] = _moveSelectedDay.split('-');
      const dateStr = `${MONTHS[parseInt(m) - 1]} ${parseInt(d)}, ${y}`;
      showToastMsg(`✅ Task moved to ${dateStr}!`);
    }

    function closeMoveDateModal() {
      document.getElementById('moveDateBg').classList.remove('show');
      _moveTaskKey = null;
      _moveSelectedDay = null;
    }

    // ── UPDATE SIDEBAR WEEK PROGRESS BARS ONLY ──
    function updateSidebarProgress() {
      const weeks = getWeeks(S.year, S.month);
      weeks.forEach((w, wi) => {
        let tot = 0, dn = 0;
        w.days.forEach(d => { const ts = getTasksFor(dKey(S.year, S.month, d)); tot += ts.length; dn += ts.filter(t => t.done).length; });
        const pct = tot > 0 ? Math.round(dn / tot * 100) : 0;
        const fills = document.querySelectorAll('.wi-pfill');
        if (fills[wi]) fills[wi].style.width = pct + '%';
      });
      // Update month dots
      MONTHS.forEach((nm, i) => {
        const pfx = `${S.year}-${String(i + 1).padStart(2, '0')}-`;
        const hasTasks = Object.keys(S.tasks).some(k => k.startsWith(pfx));
        const btns = document.querySelectorAll('.mb');
        if (btns[i]) {
          const existingDot = btns[i].querySelector('.dot');
          if (hasTasks && !existingDot) { const dot = document.createElement('div'); dot.className = 'dot'; btns[i].insertBefore(dot, btns[i].firstChild); }
          else if (!hasTasks && existingDot) { existingDot.remove(); }
        }
      });
    }

    // ── UPDATE REMAINING TAB BADGE ONLY ──
    function updateRemainingBadge() {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      let total = 0;
      Object.entries(S.tasks).forEach(([key, task]) => {
        if (task.done) return;
        const ds = key.split('::')[0];
        const [y, m, d] = ds.split('-').map(Number);
        const td = new Date(y, m - 1, d); td.setHours(0, 0, 0, 0);
        if (td < today) total++;
      });
      const tabR = document.getElementById('tabR');
      if (total > 0) { tabR.classList.add('has'); tabR.querySelector('.tab-text').textContent = ` Remaining (${total})`; }
      else { tabR.classList.remove('has'); tabR.querySelector('.tab-text').textContent = ' Remaining'; }
    }


    // ══════════════════════════════════════════
    // ── POMODORO ENGINE ──
    // ══════════════════════════════════════════

    const POMO_STORAGE_KEY = 'tf_pomo';

    // Default settings
    let PS = loadPomoState();

    function loadPomoState() {
      const saved = JSON.parse(localStorage.getItem(POMO_STORAGE_KEY) || 'null');
      return Object.assign({
        workMins: 25,
        shortBreakMins: 5,
        longBreakMins: 15,
        sessionsBeforeLong: 4,
        mode: 'work',       // work | short | long
        running: false,
        secondsLeft: 25 * 60,
        sessionsDone: 0,    // in current round
        analysisTab: 'daily',
        settingsOpen: false,
        // history: { 'YYYY-MM-DD': { pomodoros: N, focusMins: N, breakMins: N } }
        history: {}
      }, saved || {});
    }

    function savePomoState() {
      localStorage.setItem(POMO_STORAGE_KEY, JSON.stringify(PS));
      if (window._savePomoToCloud) window._savePomoToCloud(PS);
    }

    // Timer internals
    let _pomoInterval = null;
    let _pomoCircumference = 0;

    function pomoTotalSecs() {
      if (PS.mode === 'work') return PS.workMins * 60;
      if (PS.mode === 'short') return PS.shortBreakMins * 60;
      return PS.longBreakMins * 60;
    }

    function pomoModeColor() {
      if (PS.mode === 'work') return 'var(--accent)';
      if (PS.mode === 'short') return 'var(--accent3)';
      return 'var(--accent4)';
    }

    function pomoModeLabel() {
      if (PS.mode === 'work') return 'Focus Time';
      if (PS.mode === 'short') return 'Short Break';
      return 'Long Break';
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function startPomo() {
      if (PS.running) return;
      PS.running = true;
      savePomoState();
      updatePomoUI();
      _pomoInterval = setInterval(() => {
        PS.secondsLeft--;
        updatePomoRing();
        updatePomoTimeDisplay();
        if (PS.secondsLeft <= 0) {
          clearInterval(_pomoInterval);
          _pomoInterval = null;
          pomoSessionComplete();
        }
      }, 1000);
    }

    function pausePomo() {
      PS.running = false;
      clearInterval(_pomoInterval);
      _pomoInterval = null;
      savePomoState();
      updatePomoUI();
    }

    function resetPomo() {
      pausePomo();
      PS.secondsLeft = pomoTotalSecs();
      PS.running = false;
      savePomoState();
      updatePomoTimeDisplay();
      updatePomoRing();
      updatePomoUI();
    }

    function skipPomo() {
      pausePomo();
      pomoSessionComplete(true);
    }

    function setPomoMode(mode) {
      pausePomo();
      PS.mode = mode;
      PS.secondsLeft = pomoTotalSecs();
      savePomoState();
      renderPomodoro();
    }

    function pomoSessionComplete(skipped = false) {
      PS.running = false;
      // Log completed work session
      if (PS.mode === 'work' && !skipped) {
        const today = new Date();
        const dk = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        if (!PS.history[dk]) PS.history[dk] = { pomodoros: 0, focusMins: 0, breakMins: 0 };
        PS.history[dk].pomodoros++;
        PS.history[dk].focusMins += PS.workMins;
        PS.sessionsDone++;
        showPomoToast(`🍅 Pomodoro complete! Session ${PS.sessionsDone} done.`);
      } else if ((PS.mode === 'short' || PS.mode === 'long') && !skipped) {
        const today = new Date();
        const dk = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        if (!PS.history[dk]) PS.history[dk] = { pomodoros: 0, focusMins: 0, breakMins: 0 };
        PS.history[dk].breakMins += (PS.mode === 'short' ? PS.shortBreakMins : PS.longBreakMins);
        showPomoToast(`☕ Break done! Ready to focus again.`);
      }

      // Auto switch mode
      if (PS.mode === 'work') {
        const isLong = PS.sessionsDone > 0 && PS.sessionsDone % PS.sessionsBeforeLong === 0;
        PS.mode = isLong ? 'long' : 'short';
      } else {
        PS.mode = 'work';
      }
      PS.secondsLeft = pomoTotalSecs();
      savePomoState();
      playPomoSound();
      renderPomodoro();
    }

    function applyPomoSettings() {
      const w = parseInt(document.getElementById('pomoWork').value) || 25;
      const sb = parseInt(document.getElementById('pomoShort').value) || 5;
      const lb = parseInt(document.getElementById('pomoLong').value) || 15;
      const sl = parseInt(document.getElementById('pomoSessions').value) || 4;
      PS.workMins = Math.max(1, Math.min(90, w));
      PS.shortBreakMins = Math.max(1, Math.min(30, sb));
      PS.longBreakMins = Math.max(1, Math.min(60, lb));
      PS.sessionsBeforeLong = Math.max(1, Math.min(10, sl));
      pausePomo();
      PS.secondsLeft = pomoTotalSecs();
      savePomoState();
      renderPomodoro();
      showPomoToast('⚙️ Settings saved!');
    }

    function togglePomoSettings() {
      PS.settingsOpen = !PS.settingsOpen;
      const body = document.getElementById('pomoSettingsBody');
      const arrow = document.getElementById('pomoSettingsArrow');
      if (body) { body.classList.toggle('hidden', !PS.settingsOpen); }
      if (arrow) { arrow.textContent = PS.settingsOpen ? '▲' : '▼'; }
    }

    function switchAnalysisTab(t) {
      PS.analysisTab = t;
      document.querySelectorAll('.pan-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
      renderPomoAnalysis();
    }

    // ── UI updates (no full re-render) ──
    function updatePomoTimeDisplay() {
      const el = document.getElementById('pomoTimeDisp');
      if (el) el.textContent = formatTime(PS.secondsLeft);
    }

    function updatePomoRing() {
      const ring = document.getElementById('pomoRing');
      if (!ring) return;
      const total = pomoTotalSecs();
      const pct = PS.secondsLeft / total;
      const offset = _pomoCircumference * (1 - pct);
      ring.style.strokeDashoffset = offset;
      // Update tab title
      document.title = `${formatTime(PS.secondsLeft)} — ${pomoModeLabel()} · TaskFlow`;
    }

    function updatePomoUI() {
      const startBtn = document.getElementById('pomoStartBtn');
      const pauseBtn = document.getElementById('pomoPauseBtn');
      if (startBtn) startBtn.style.display = PS.running ? 'none' : 'block';
      if (pauseBtn) pauseBtn.style.display = PS.running ? 'block' : 'none';
    }

    // ── Sound ──
    function playPomoSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 150, 300].forEach(delay => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.3, ctx.currentTime + delay / 1000);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay / 1000 + 0.3);
          osc.start(ctx.currentTime + delay / 1000);
          osc.stop(ctx.currentTime + delay / 1000 + 0.3);
        });
      } catch (e) { }
    }

    // ── Toast ──
    let _toastTimeout = null;
    function showPomoToast(msg) {
      const t = document.getElementById('pomoToast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(_toastTimeout);
      _toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── RENDER FULL POMODORO VIEW ──
    function renderPomodoro() {
      const pv = document.getElementById('pview');
      if (!pv.classList.contains('on')) return;

      const r = 95; // circle radius
      const circ = 2 * Math.PI * r;
      _pomoCircumference = circ;
      const total = pomoTotalSecs();
      const pct = PS.secondsLeft / total;
      const offset = circ * (1 - pct);
      const color = pomoModeColor();

      // Session dots
      const totalDots = PS.sessionsBeforeLong;
      const doneDots = PS.sessionsDone % PS.sessionsBeforeLong;
      let dotsHTML = '';
      for (let i = 0; i < totalDots; i++) {
        const cls = i < doneDots ? 'done' : (PS.running && i === doneDots ? 'current' : '');
        dotsHTML += `<div class="pomo-dot ${cls}"></div>`;
      }

      pv.innerHTML = `
  <div class="pomo-toast" id="pomoToast"></div>
  <div class="pomo-wrap">

    <!-- Mode tabs -->
    <div class="pomo-modes">
      <button class="pomo-mode-btn work ${PS.mode === 'work' ? 'active' : ''}" onclick="setPomoMode('work')">🍅 Focus</button>
      <button class="pomo-mode-btn sbreak ${PS.mode === 'short' ? 'active' : ''}" onclick="setPomoMode('short')">☕ Short Break</button>
      <button class="pomo-mode-btn lbreak ${PS.mode === 'long' ? 'active' : ''}" onclick="setPomoMode('long')">🌙 Long Break</button>
    </div>

    <!-- Circle timer -->
    <div class="pomo-circle-wrap">
      <div class="pomo-svg-wrap">
        <svg class="pomo-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <circle class="pomo-track" cx="110" cy="110" r="${r}"/>
          <circle class="pomo-prog" id="pomoRing" cx="110" cy="110" r="${r}"
            stroke="${color}"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="pomo-inner">
          <div class="pomo-time" id="pomoTimeDisp" style="color:${color}">${formatTime(PS.secondsLeft)}</div>
          <div class="pomo-label">${pomoModeLabel()}</div>
        </div>
      </div>
    </div>

    <!-- Session dots -->
    <div class="pomo-sessions">
      ${dotsHTML}
      <span class="pomo-session-lbl">Session ${(PS.sessionsDone % PS.sessionsBeforeLong) + 1} of ${PS.sessionsBeforeLong}</span>
    </div>

    <!-- Controls -->
    <div class="pomo-controls">
      <button class="pomo-btn start" id="pomoStartBtn" onclick="startPomo()" style="display:${PS.running ? 'none' : 'block'}">▶ Start</button>
      <button class="pomo-btn pause" id="pomoPauseBtn" onclick="pausePomo()" style="display:${PS.running ? 'block' : 'none'}">⏸ Pause</button>
      <button class="pomo-btn reset" onclick="resetPomo()">↺ Reset</button>
      <button class="pomo-skip" onclick="skipPomo()">Skip →</button>
    </div>

    <!-- Settings -->
    <div class="pomo-settings">
      <div class="pomo-settings-title" onclick="togglePomoSettings()">
        ⚙ Customize Timings
        <span id="pomoSettingsArrow">${PS.settingsOpen ? '▲' : '▼'}</span>
      </div>
      <div class="pomo-settings-body ${PS.settingsOpen ? '' : 'hidden'}" id="pomoSettingsBody">
        <div class="pomo-field">
          <label>Focus (mins)</label>
          <div class="pomo-field-row">
            <input class="pomo-inp" id="pomoWork" type="number" min="1" max="90" value="${PS.workMins}">
          </div>
        </div>
        <div class="pomo-field">
          <label>Short Break (mins)</label>
          <div class="pomo-field-row">
            <input class="pomo-inp" id="pomoShort" type="number" min="1" max="30" value="${PS.shortBreakMins}">
          </div>
        </div>
        <div class="pomo-field">
          <label>Long Break (mins)</label>
          <div class="pomo-field-row">
            <input class="pomo-inp" id="pomoLong" type="number" min="1" max="60" value="${PS.longBreakMins}">
          </div>
        </div>
        <div class="pomo-field">
          <label>Sessions before long break</label>
          <div class="pomo-field-row">
            <input class="pomo-inp" id="pomoSessions" type="number" min="1" max="10" value="${PS.sessionsBeforeLong}">
          </div>
        </div>
        <div class="pomo-field" style="justify-content:flex-end;display:flex;align-items:flex-end;">
          <button class="pomo-apply" onclick="applyPomoSettings()">Apply</button>
        </div>
      </div>
    </div>

    <!-- Analysis -->
    <div class="pomo-analysis">
      <div class="pomo-analysis-tabs">
        <button class="pan-tab ${PS.analysisTab === 'daily' ? 'active' : ''}" data-tab="daily" onclick="switchAnalysisTab('daily')">📅 Today</button>
        <button class="pan-tab ${PS.analysisTab === 'weekly' ? 'active' : ''}" data-tab="weekly" onclick="switchAnalysisTab('weekly')">📆 This Week</button>
        <button class="pan-tab ${PS.analysisTab === 'monthly' ? 'active' : ''}" data-tab="monthly" onclick="switchAnalysisTab('monthly')">🗓 This Month</button>
      </div>
      <div id="pomoAnalysisContent"></div>
    </div>

  </div>`;

      renderPomoAnalysis();

      // Restart interval if was running
      if (PS.running && !_pomoInterval) {
        _pomoInterval = setInterval(() => {
          PS.secondsLeft--;
          updatePomoRing();
          updatePomoTimeDisplay();
          if (PS.secondsLeft <= 0) {
            clearInterval(_pomoInterval);
            _pomoInterval = null;
            pomoSessionComplete();
          }
        }, 1000);
      }
    }

    // ── RENDER ANALYSIS ──
    function renderPomoAnalysis() {
      const cont = document.getElementById('pomoAnalysisContent');
      if (!cont) return;

      const today = new Date();
      const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      if (PS.analysisTab === 'daily') {
        const d = PS.history[todayKey] || { pomodoros: 0, focusMins: 0, breakMins: 0 };
        const streak = calcStreak();
        const bestStreak = calcBestStreak();
        cont.innerHTML = `
      <div class="pomo-stats-row">
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent)">${d.pomodoros}</div><div class="pomo-stat-l">🍅 Pomodoros</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent3)">${d.focusMins}<span style="font-size:0.9rem">m</span></div><div class="pomo-stat-l">⏱ Focus</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent2)">${streak}</div><div class="pomo-stat-l">🔥 Streak</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent4)">${bestStreak}</div><div class="pomo-stat-l">🏆 Best Streak</div></div>
      </div>
      ${renderHourlyChart()}`;
      }
      else if (PS.analysisTab === 'weekly') {
        const days = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(today); d.setDate(d.getDate() - i);
          const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          // Label: "Mon\n9" — day name + date number
          days.push({
            key: k,
            label: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d.getDay()] + ' ' + d.getDate(),
            data: PS.history[k] || { pomodoros: 0, focusMins: 0, breakMins: 0 }
          });
        }
        const totP = days.reduce((a, d) => a + d.data.pomodoros, 0);
        const totF = days.reduce((a, d) => a + d.data.focusMins, 0);
        const best = days.reduce((a, d) => d.data.pomodoros > a ? d.data.pomodoros : a, 0);
        const activeDays = days.filter(d => d.data.pomodoros > 0).length;
        const focusHours = Math.round(totF / 60 * 10) / 10;
        cont.innerHTML = `
      <div class="pomo-stats-row">
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent)">${totP}</div><div class="pomo-stat-l">🍅 Pomodoros</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent3)">${focusHours}<span style="font-size:0.9rem">h</span></div><div class="pomo-stat-l">⏱ Focus</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent4)">${activeDays}</div><div class="pomo-stat-l">📅 Active Days</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent2)">${best}</div><div class="pomo-stat-l">🏆 Best Day</div></div>
      </div>
      ${renderBarChart(days, 'label')}
      ${renderFocusBarChart(days, 'label')}`;
      }
      else {
        // Monthly — only show days 1 to today (not future days)
        const daysToShow = today.getDate(); // only up to today
        const days = [];
        for (let i = 1; i <= daysToShow; i++) {
          const k = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
          days.push({ key: k, label: String(i), data: PS.history[k] || { pomodoros: 0, focusMins: 0, breakMins: 0 } });
        }
        const totP = days.reduce((a, d) => a + d.data.pomodoros, 0);
        const totF = days.reduce((a, d) => a + d.data.focusMins, 0);
        const activeDays = days.filter(d => d.data.pomodoros > 0).length;
        const best = days.reduce((a, d) => d.data.pomodoros > a ? d.data.pomodoros : a, 0);
        const bestDay = days.find(d => d.data.pomodoros === best);
        const avgPerActiveDay = activeDays > 0 ? Math.round(totF / activeDays) : 0;
        cont.innerHTML = `
      <div class="pomo-stats-row">
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent)">${totP}</div><div class="pomo-stat-l">🍅 Pomodoros</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent3)">${Math.round(totF / 60 * 10) / 10}<span style="font-size:0.9rem">h</span></div><div class="pomo-stat-l">⏱ Focus Hours</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent4)">${activeDays}</div><div class="pomo-stat-l">📅 Active Days</div></div>
        <div class="pomo-stat"><div class="pomo-stat-n" style="color:var(--accent2)">${avgPerActiveDay}<span style="font-size:0.9rem">m</span></div><div class="pomo-stat-l">📊 Avg/Day</div></div>
      </div>
      ${bestDay && best > 0 ? `<div style="background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.15);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:0.78rem;color:var(--accent)">🏆 Best day this month: <strong>Day ${bestDay.label}</strong> with ${best} pomodoros (${bestDay.data.focusMins} focus mins)</div>` : ''}
      ${renderBarChart(days, 'label')}
      ${renderFocusBarChart(days, 'label')}`;
      }
    }

    // ── PROPER AXIS CHART: Y = value, X = Day ──
    function renderAxisChart(days, labelKey, opts = {}) {
      const { color = 'var(--accent)', title = 'Focus Time', unit = 'min', valueKey = 'focusMins' } = opts;

      const today = new Date();
      const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

      const values = days.map(d => d.data[valueKey] || 0);
      const maxVal = Math.max(...values, 1);
      const niceMax = niceNumber(maxVal);

      // Y axis: 5 ticks from niceMax down to 0
      const ySteps = 4;
      const yTicks = Array.from({ length: ySteps + 1 }, (_, i) => niceMax - (niceMax / ySteps) * i);
      const showHours = unit === 'min' && niceMax >= 120;
      const yLabels = yTicks.map(v => {
        if (v === 0) return '0';
        if (showHours) return (Math.round(v / 60 * 10) / 10) + 'h';
        return Math.round(v) + (unit === 'min' ? 'm' : '');
      });

      // Grid lines at 25,50,75%
      const gridLines = [25, 50, 75].map(pct =>
        `<div class="pomo-grid-line" style="bottom:${pct}%"></div>`
      ).join('');

      // Bars — each fixed 28px wide for scroll
      const cols = days.map(d => {
        const val = d.data[valueKey] || 0;
        const heightPct = niceMax > 0 ? (val / niceMax) * 100 : 0;
        const isToday = d.key === todayKey;
        const barColor = isToday ? color : 'rgba(255,255,255,0.1)';
        const tooltip = unit === 'min'
          ? `${d[labelKey]}: ${val}m focus`
          : `${d[labelKey]}: ${val} 🍅`;
        return `<div class="pomo-col" id="bar-${d.key}-${valueKey}">
      <div class="pomo-col-bar"
        style="height:${Math.max(heightPct, val > 0 ? 2 : 0)}%;background:${barColor};${isToday ? `box-shadow:0 0 12px ${color}60` : ''}">
        <div class="bar-tooltip">${tooltip}</div>
      </div>
    </div>`;
      }).join('');

      const xLabels = days.map(d => {
        const isToday = d.key === todayKey;
        return `<div class="pomo-x-label${isToday ? ' today' : ''}">${d[labelKey]}</div>`;
      }).join('');

      const chartId = 'chart-' + valueKey + '-' + Date.now();

      // Auto scroll to today after render
      setTimeout(() => {
        const scrollEl = document.getElementById(chartId);
        if (!scrollEl) return;
        const todayIdx = days.findIndex(d => d.key === todayKey);
        if (todayIdx >= 0) {
          scrollEl.scrollLeft = Math.max(0, (todayIdx * 30) - scrollEl.clientWidth / 2);
        }
      }, 50);

      return `<div class="pomo-chart-wrap" style="margin-bottom:12px">
    <div class="pomo-chart-title">${title}</div>
    <div class="pomo-axis-chart">
      <div class="pomo-y-axis">
        ${yLabels.map(l => `<div class="pomo-y-label">${l}</div>`).join('')}
      </div>
      <div class="pomo-bars-area">
        <div class="pomo-scroll-area" id="${chartId}">
          <div class="pomo-scroll-inner">
            <div class="pomo-grid-lines">
              ${gridLines}
              ${cols || '<div class="pomo-no-data">No data yet</div>'}
            </div>
            <div class="pomo-x-labels">${xLabels}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
    }

    function niceNumber(val) {
      if (val <= 0) return 10;
      const exp = Math.floor(Math.log10(val));
      const mag = Math.pow(10, exp);
      const norm = val / mag;
      if (norm <= 1) return mag;
      if (norm <= 2) return 2 * mag;
      if (norm <= 5) return 5 * mag;
      return 10 * mag;
    }

    // Focus time chart (Y = minutes)
    function renderBarChart(days, labelKey) {
      return renderAxisChart(days, labelKey, {
        color: 'var(--accent)',
        title: '⏱ Focus Time per Day (minutes)',
        unit: 'min',
        valueKey: 'focusMins'
      });
    }

    // Pomodoro count chart (Y = count)
    function renderFocusBarChart(days, labelKey) {
      return renderAxisChart(days, labelKey, {
        color: 'var(--accent3)',
        title: '🍅 Pomodoros per Day',
        unit: 'pomo',
        valueKey: 'pomodoros'
      });
    }

    // Today's detailed view — focus/break split + stats
    function renderHourlyChart() {
      const now = new Date();
      const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      const d = PS.history[todayKey];

      if (!d || d.pomodoros === 0) return `
    <div class="pomo-chart-wrap" style="text-align:center;padding:32px 20px">
      <div style="font-size:2rem;margin-bottom:10px">🍅</div>
      <div style="color:var(--muted);font-size:0.85rem">Start your first pomodoro to see today's stats!</div>
    </div>`;

      const focusMins = d.focusMins || 0;
      const breakMins = d.breakMins || 0;
      const total = focusMins + breakMins || 1;
      const focusPct = Math.round(focusMins / total * 100);
      const breakPct = 100 - focusPct;
      const focusH = Math.floor(focusMins / 60);
      const focusM = focusMins % 60;
      // Use actual workMins setting for efficiency, not hardcoded 25
      const efficiency = d.pomodoros > 0 ? Math.round((focusMins / (d.pomodoros * PS.workMins)) * 100) : 0;
      const avgSession = d.pomodoros > 0 ? Math.round(focusMins / d.pomodoros) : 0;

      return `
  <div class="pomo-chart-wrap">
    <div class="pomo-chart-title">⏱ Today's Breakdown</div>
    <div style="margin:12px 0 16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:0.75rem;color:var(--accent)">🍅 Focus</span>
        <span style="font-size:0.75rem;color:var(--accent)">${focusH > 0 ? focusH + 'h ' : ''} ${focusM}m &nbsp;(${focusPct}%)</span>
      </div>
      <div style="height:12px;background:var(--surface2);border-radius:8px;overflow:hidden;margin-bottom:10px">
        <div style="height:100%;width:${focusPct}%;background:var(--accent);border-radius:8px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:0.75rem;color:var(--accent3)">☕ Break</span>
        <span style="font-size:0.75rem;color:var(--accent3)">${breakMins}m &nbsp;(${breakPct}%)</span>
      </div>
      <div style="height:12px;background:var(--surface2);border-radius:8px;overflow:hidden">
        <div style="height:100%;width:${breakPct}%;background:var(--accent3);border-radius:8px"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent)">${d.pomodoros}</div>
        <div style="font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px">Sessions</div>
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent4)">${Math.min(efficiency, 100)}%</div>
        <div style="font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px">Efficiency</div>
      </div>
      <div style="background:var(--surface2);border-radius:10px;padding:10px;text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--accent2)">${avgSession}m</div>
        <div style="font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px">Avg/Session</div>
      </div>
    </div>
  </div>`;
    }

    function calcStreak() {
      let streak = 0;
      const today = new Date();
      for (let i = 0; i < 365; i++) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        if (PS.history[k] && PS.history[k].pomodoros > 0) streak++;
        else if (i > 0) break;
      }
      return streak;
    }

    function calcBestStreak() {
      let best = 0, cur = 0;
      const keys = Object.keys(PS.history).filter(k => PS.history[k].pomodoros > 0).sort();
      keys.forEach((k, i) => {
        if (i === 0) { cur = 1; }
        else {
          const prev = new Date(keys[i - 1]); prev.setDate(prev.getDate() + 1);
          const curr = new Date(k);
          cur = (prev.toDateString() === curr.toDateString()) ? cur + 1 : 1;
        }
        best = Math.max(best, cur);
      });
      return best;
    }

    // Update browser title back when leaving pomodoro
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) return;
      if (S.tab !== 'pomodoro') document.title = 'TaskFlow — Monthly Planner';
    });

    // Set initial sidebar state
    if (window.innerWidth <= 768) {
      sidebarOpen = false;
    } else {
      sidebarOpen = true;
    }

    refresh();

    // Auto-select current week
    const now = new Date();
    if (S.year === now.getFullYear() && S.month === now.getMonth()) {
      const weeks = getWeeks(S.year, S.month);
      const nd = now.getDate();
      const wi = weeks.findIndex(w => w.days.includes(nd));
      if (wi !== -1) { S.week = wi; refresh(); }
    }

    // ══════════════════════════════════════════
    // ── EXAM ENGINE ──
    // ══════════════════════════════════════════

    const EXAM_KEY = 'tf_exams';
    const EXAM_TYPES = {
      'Mid-term': { bg: 'rgba(232,255,71,.15)', c: '#e8ff47' },
      'End-term': { bg: 'rgba(255,107,107,.15)', c: '#ff6b6b' },
      'Lab': { bg: 'rgba(107,179,255,.15)', c: '#6bb3ff' },
      'Viva': { bg: 'rgba(107,255,212,.15)', c: '#6bffd4' },
      'Assignment': { bg: 'rgba(255,170,107,.15)', c: '#ffaa6b' },
    };

    let EX = JSON.parse(localStorage.getItem(EXAM_KEY) || '[]');
    let examCalMonth = new Date().getMonth();
    let examCalYear = new Date().getFullYear();

    function saveExams() {
      localStorage.setItem(EXAM_KEY, JSON.stringify(EX));
      if (window._saveExamsToCloud) window._saveExamsToCloud(EX); // ADD this
    }

    function updateExamBadge() {
      const tabE = document.getElementById('tabE');
      if (!tabE) return;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const upcoming = EX.filter(e => {
        const d = new Date(e.date); d.setHours(0, 0, 0, 0);
        return d >= today;
      }).length;
      const txt = tabE.querySelector('.tab-text');
      if (txt) txt.textContent = upcoming > 0 ? ` Exams (${upcoming})` : ' Exams';
      if (upcoming > 0) tabE.classList.add('has'); else tabE.classList.remove('has');
    }

    function examCountdown(dateStr) {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const exam = new Date(dateStr); exam.setHours(0, 0, 0, 0);
      const diff = Math.round((exam - today) / 86400000);
      if (diff < 0) return { label: Math.abs(diff) + 'd ago', cls: 'past' };
      if (diff === 0) return { label: 'Today! 🔴', cls: 'today-exam' };
      if (diff === 1) return { label: 'Tomorrow!', cls: 'urgent' };
      if (diff <= 3) return { label: 'in ' + diff + ' days', cls: 'urgent' };
      if (diff <= 7) return { label: 'in ' + diff + ' days', cls: 'soon' };
      return { label: 'in ' + diff + ' days', cls: 'normal' };
    }

    function addExam() {
      const name = document.getElementById('examName').value.trim();
      const date = document.getElementById('examDate').value;
      const type = document.getElementById('examType').value;
      const tbd = document.getElementById('examTimeTbd').checked;
      const time = tbd ? null : document.getElementById('examTime').value;

      if (!name) { showToastMsg('⚠️ Please enter exam name'); return; }
      if (!date) { showToastMsg('⚠️ Please select exam date'); return; }

      EX.push({ id: uid(), name, date, type, time });
      EX.sort((a, b) => new Date(a.date) - new Date(b.date));
      saveExams();
      document.getElementById('examName').value = '';
      document.getElementById('examDate').value = '';
      document.getElementById('examTime').value = '';
      document.getElementById('examTimeTbd').checked = false;
      document.getElementById('examTime').disabled = false;
      renderExam();
      showToastMsg('✅ Exam added!');
    }

    function delExam(id) {
      EX = EX.filter(e => e.id !== id);
      saveExams();
      renderExam();
    }

    function toggleTimeTbd() {
      const tbd = document.getElementById('examTimeTbd').checked;
      document.getElementById('examTime').disabled = tbd;
      if (tbd) document.getElementById('examTime').value = '';
    }

    function renderExamCalendar() {
      const container = document.getElementById('examCalContainer');
      if (!container) return;

      const today = new Date(); today.setHours(0, 0, 0, 0);
      const firstDay = new Date(examCalYear, examCalMonth, 1).getDay();
      const daysInMonth = new Date(examCalYear, examCalMonth + 1, 0).getDate();

      // Build exam map for this month
      const examMap = {};
      EX.forEach(e => {
        const d = new Date(e.date);
        if (d.getFullYear() === examCalYear && d.getMonth() === examCalMonth) {
          const day = d.getDate();
          if (!examMap[day]) examMap[day] = [];
          examMap[day].push(e);
        }
      });

      const DOWS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      let html = `<div class="exam-cal-grid">`;

      // Day headers
      DOWS.forEach(d => { html += `<div class="exam-cal-dow">${d}</div>`; });

      // Empty cells before first day
      for (let i = 0; i < firstDay; i++) html += `<div class="exam-cal-day empty"></div>`;

      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const cellDate = new Date(examCalYear, examCalMonth, d); cellDate.setHours(0, 0, 0, 0);
        const isToday = cellDate.getTime() === today.getTime();
        const isPast = cellDate < today;
        const exams = examMap[d] || [];
        const hasExam = exams.length > 0;

        let cls = 'exam-cal-day';
        if (isToday) cls += ' today-cal';
        if (isPast && !isToday) cls += ' past-cal';
        if (hasExam) cls += ' has-exam';

        let dots = '';
        let tooltipLines = '';
        exams.forEach(e => {
          const tc = EXAM_TYPES[e.type] || EXAM_TYPES['Mid-term'];
          dots += `<div class="exam-dot" style="background:${tc.c}"></div>`;
          tooltipLines += `<div>${e.name} ${e.time ? '@ ' + e.time : ''}</div>`;
        });

        html += `<div class="${cls}">
      <div style="font-size:0.75rem;font-weight:${isToday ? '800' : '400'}">${d}</div>
      ${hasExam ? `<div class="exam-dot-wrap">${dots}</div>
      <div class="exam-cal-tooltip">${tooltipLines}</div>` : ''}
    </div>`;
      }

      html += `</div>`;
      container.innerHTML = html;
    }

    function examCalNav(dir) {
      examCalMonth += dir;
      if (examCalMonth > 11) { examCalMonth = 0; examCalYear++; }
      if (examCalMonth < 0) { examCalMonth = 11; examCalYear--; }
      document.getElementById('examCalTitle').textContent = `${MONTHS[examCalMonth]} ${examCalYear}`;
      renderExamCalendar();
    }

    function renderExam() {
      const ev = document.getElementById('eview');
      if (!ev) return;

      const today = new Date(); today.setHours(0, 0, 0, 0);
      const upcoming = EX.filter(e => { const d = new Date(e.date); d.setHours(0, 0, 0, 0); return d >= today; });
      const past = EX.filter(e => { const d = new Date(e.date); d.setHours(0, 0, 0, 0); return d < today; });

      function tableRows(list) {
        if (!list.length) return '';
        return list.map(e => {
          const tc = EXAM_TYPES[e.type] || EXAM_TYPES['Mid-term'];
          const cd = examCountdown(e.date);
          const d = new Date(e.date);
          const dateStr = `${DAYS_SHORT[d.getDay()]}, ${MONTHS[d.getMonth()].slice(0, 3)} ${d.getDate()}, ${d.getFullYear()}`;
          const timeStr = e.time ? e.time : '<span style="color:var(--muted);font-size:0.72rem">TBD</span>';
          return `<tr class="exam-row">
        <td class="exam-name-cell">${esc(e.name)}</td>
        <td><span class="exam-type-pill" style="background:${tc.bg};color:${tc.c}">${e.type}</span></td>
        <td style="white-space:nowrap">${dateStr}</td>
        <td>${timeStr}</td>
        <td><span class="exam-countdown ${cd.cls}">${cd.label}</span></td>
        <td><button class="exam-del-btn" onclick="delExam('${e.id}')">✕</button></td>
      </tr>`;
        }).join('');
      }

      ev.innerHTML = `
  <!-- ADD FORM -->
  <div class="exam-form">
    <div class="exam-form-title">➕ Add Exam</div>
    <div class="exam-form-grid">
      <div class="exam-field" style="grid-column:1/-1">
        <label>Exam Name</label>
        <input class="exam-input" id="examName" placeholder="e.g. Data Structures Mid-term" onkeydown="if(event.key==='Enter')addExam()">
      </div>
      <div class="exam-field">
        <label>Exam Type</label>
        <select class="exam-type-select" id="examType">
          ${Object.keys(EXAM_TYPES).map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
      </div>
      <div class="exam-field">
        <label>Date</label>
        <input class="exam-input" id="examDate" type="date">
      </div>
      <div class="exam-field" style="grid-column:1/-1">
        <label>Time</label>
        <div class="exam-time-row">
          <input class="exam-input" id="examTime" type="time" style="flex:1">
          <label class="exam-tbd">
            <input type="checkbox" id="examTimeTbd" onchange="toggleTimeTbd()">
            Time TBD
          </label>
        </div>
      </div>
    </div>
    <button class="exam-add-btn" onclick="addExam()">Add Exam</button>
  </div>

  <!-- UPCOMING TABLE -->
  <div class="exam-section-title">📅 Upcoming Exams <span>${upcoming.length}</span></div>
  ${upcoming.length ? `
  <table class="exam-table">
    <thead><tr>
      <th>Exam</th><th>Type</th><th>Date</th><th>Time</th><th>Countdown</th><th></th>
    </tr></thead>
    <tbody>${tableRows(upcoming)}</tbody>
  </table>` : `<div class="exam-empty">No upcoming exams. Add one above! 🎓</div>`}

  <!-- PAST TABLE -->
  ${past.length ? `
  <div class="exam-section-title" style="margin-top:8px">✅ Completed Exams <span>${past.length}</span></div>
  <table class="exam-table" style="opacity:0.6">
    <thead><tr>
      <th>Exam</th><th>Type</th><th>Date</th><th>Time</th><th>Status</th><th></th>
    </tr></thead>
    <tbody>${tableRows(past)}</tbody>
  </table>` : ''}

  <!-- CALENDAR -->
  <div class="exam-cal-wrap">
    <div class="exam-cal-header">
      <div class="exam-cal-title" id="examCalTitle">${MONTHS[examCalMonth]} ${examCalYear}</div>
      <div class="exam-cal-nav">
        <button class="exam-cal-btn" onclick="examCalNav(-1)">‹</button>
        <button class="exam-cal-btn" onclick="examCalNav(1)">›</button>
      </div>
    </div>
    <div id="examCalContainer"></div>
  </div>`;

      renderExamCalendar();
      updateExamBadge();
    }

    // Init exam badge on load
    updateExamBadge();
    // ── REGISTER SERVICE WORKER (PWA) ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Task/sw.js').then(reg => {
          console.log('TaskFlow PWA ready ✅');
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                newSW.postMessage('SKIP_WAITING');
              }
            });
          });
        }).catch(e => console.warn('SW failed:', e));
      });
    }
  </script>
</body>

</html>
